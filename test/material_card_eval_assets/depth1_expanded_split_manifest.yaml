      original_text: 虽然父亲为子女带来的往往是爱与关怀，但有时父亲与子女也难免存在分歧和对立。一个典型的例子发生在英国著名作家艾德蒙·戈斯的回忆录《父与子》中。戈斯的父亲是著名的博物学家，在海洋生物研究领域颇有建树，也是“水族馆”一词的创造者。与父亲不同，戈斯立志并最终成为一位诗人和文学评论家。而正是这种身份和理念上的不同使二人在很多问题上的看法相左，有时这类分歧甚至是无法调和的。戈斯在描述《父与子》的特点时写道，这本书“记录了两种性情之间的斗争”，同时也是“两个时代之间的斗争”。在戈斯看来，父辈与年轻一代间的代沟难免会导致分歧。正如美国著名学者刘易斯·芒福德所说，“每一代人总是反抗自己的父辈”，但“却总和祖父那一辈人交上朋友”。这也许也是家庭关系中无法避免的一个现象，但这些父子间的观念冲突在某种程度上也可以被理解为父亲对孩子的关怀或是一种引导，生怕他们误入歧途，抑或提供一个不同的视角，帮助他们更好地思考自己的人生选择。

        ，加之高血压在部分人群身上并没有明显不适症状，特别是对中青年群体而言，这一群体认为自己年轻、身体素质较好，不会有高血压，或是在已知自身有高血压之后觉得有足够的身体资本去应对，从而导致中风等意外发生。从这一角度出发，调低成人高血压诊断界值无异于向相关人群发出健康警告，提示人们应该重视自身健康状况，向更加自律健康的生活方式转变。

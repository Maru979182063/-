      original_text: 信息时代到来，在线办公、居家办公逐渐成为现实可能。但一些现实困扰也因此袭来，如工作时间的边界感逐渐模糊，很多单位虽然没有明确要求“24小时在线”，但在下班时间、周末、节假日处理工作，几乎成为打工人生活的一部分。无论是周末还是节假日，“微信加班”成常态，如此现实，引起很多劳动者的强烈不满。理性地说，加班可以理解，但“碎片式加班”成为常态则难以理解。对各类用人单位来说，难免会遇见一些紧急任务、突发情况，此时让员工们加班，并给予法律规定的加班工资，这在情理之中。但现实是，不管有没有紧急情况，一些单位还是习惯性让员工们加班，甚至为了不给加班工资，还转化为“碎片式加班”，这就是对劳动者合法权益的严重侵害，必须要有现实的回应，在劳动者和用人单位的法律素养提升、劳动部门的监管和法律法规的完善等多方面，都应及时发力、努力作为，更加全面地保护好劳动者的合法权益，构建起更加良性的用工环境、用工氛围。

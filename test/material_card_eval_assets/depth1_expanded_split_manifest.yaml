      original_text: “非物质文化遗产”这个名词如今越来越普及了，标志之一就是每到年节非遗老字号食品、非遗手工制品、非遗民俗活动等就会集中开展线上线下的展览展示展销活动。“非遗”承载着中国人的文化乡愁，是中国人生活方式、思想观念的载体。和正式的史书相比，非遗所记录的历史亲切、朴素而丰富，充满了人情味儿和烟火气。就拿春节来说，已经列入国家级非遗名录的与春节有关的非遗项目就有200多个，诸如舞龙、舞狮、灯会、庙会、年画、剪纸、社火······不胜枚举。丰富多彩的非遗展示出了中华文化的深厚与多样，所营造出的节日氛围，是其他事物难以替代的。

      original_text: 在上海市区的苏州河边，有一个叫老场坊的地方。上世纪30年代，这里是一个由英国人设计的屠宰场，但现在改建成了众多咖啡厅、时尚饰品、艺术店铺的集合地，成为上海市内一个著名艺术区
        2016年底，我在这里的星巴克咖啡店结束了一个关于作家村上春树的采访后，在建筑内部用粗壮水泥墙隔开的像迷宫般的空间内转了转 沿着曾经驱赶牛群走向屠宰车间的低矮步道，满是提着相机，戴着冷帽，穿着棒球衫、牛仔服的年轻人，像缓慢稠密的水流，涌动在这栋水泥迷宫的各个角落

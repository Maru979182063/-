      original_text: 家中有人做客时，自己的孩子坐在凳子上，一边看动画片一边乱动，结果不小心从凳子上摔了下去，然后哇哇大哭。这时，许多父母会觉得很愤怒，于是斥责孩子：“看个动画片都不老实，自己把自己摔了还有脸哭？”从心理学的角度讲，这样的批评很可能只是父母在发泄自己内心的愤怒，对孩子的教育意义微乎其微，甚至适得其反：摔倒的孩子正处于伤心中，无法领会父母批评背后的“深意”，只能听到父母的呵斥，因而可能会哭得更厉害。此时，如果旁边有其他孩子看到了这一幕，也只会得出“摔倒了不能哭，否则就会被大人骂”的结论。事实上，父母对待孩子的态度和方式关系到孩子的心理健康，当众批评孩子会影响孩子自尊心的形成及发展。一味的打骂、呵斥不仅会使孩子感到在外人面前“丢了人”，还会使孩子形成“某件坏事的出现是自己活该”的消极思维。

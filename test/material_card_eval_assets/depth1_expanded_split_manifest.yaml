      original_text: 新冠病毒之所以“善变”，是因为它是RNA（核糖核酸）病毒。RNA病毒复制依赖于自身携带的RNA聚合酶，这种聚合酶纠错能力比较差，若病毒在复制时发生基因突变，聚合酶不会清除出现突变的基因。长此以往，突变基因就会在RNA病毒中不断积累，最终导致RNA病毒不停变异。病毒是结构非常简单的微小生物，它不能单独生存，必须生存在其他生物的细胞内，这就决定了它必须依赖于宿主的细胞才能进行生存与繁殖。人类是新冠病毒的宿主，病毒和人类免疫系统的相互适应促使两者共同进化。也就是说，病毒与宿主的相互作用使得它们不断地进化，最终得以共同生存。我们有时用军备竞赛来描述两者间的关系，如果人的免疫系统强大了，能压制住病毒，当病毒进入人体后就会被免疫系统清除掉；病毒为了活下去，也要提升自己的“军备”，即不停地变异，以适应宿主免疫，而后病毒得以继续在宿主身上进行复制。

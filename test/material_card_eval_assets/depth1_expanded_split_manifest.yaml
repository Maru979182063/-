      original_text: 溶酶体是细胞的“垃圾处理中心”，其特殊的酸性环境以及包含的多种酸性水解酶能将受损细胞器等“垃圾”降解和再利用。此前，全基因组关联研究揭示，某些与溶酶体功能密切相关的基因的突变与帕金森病的风险高度相关，其中约的帕金森病患者有TMEM175基因的突变。不妨将溶酶体理解成胃，其酸性环境失衡，影响正常功能，就会引发消化不良甚至致病。细胞生物学家曾发现，为了维持的酸性环境，溶酶体膜上的氢离子泵可以消耗能量为代价，持续从细胞质向溶酶体泵入氢离子。这好比水库保持水位，有进水泵，还得配泄洪闸。溶酶体膜上也应该有相应的离子通道来介导氢离子流出，用来维持稳定的酸性环境。联合团队展开深入合作，利用溶酶体膜片钳技术，通过表达筛选的方法，发现TMEM175就是溶酶体的“泄洪闸”，且只会在溶酶体腔内酸性环境下被激活。当TMEM175出现突变，会造成溶酶体酸性过高、溶酶体功能减弱等后果，导致细胞代谢产物在溶酶体过度累积、致使细胞损伤，进而诱发帕金森病等神经退行性疾病。这一结论也在团队搭建的帕金森病神经细胞模型和小鼠模型上得到验证。

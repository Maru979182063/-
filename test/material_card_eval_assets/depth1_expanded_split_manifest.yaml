      original_text: 二氧化硫是酸雨的成分，看到这个名字人们往往会联想到化工厂的白烟。所以提到二氧化硫，“不法商家”“非法滥用”“三无作坊”“毒食”等用语往往是标准配置。也有“专家”表示，“二氧化硫会导致恶心、呕吐、腹痛、头晕、呼吸困难，甚至危及生命”，以及“长期食用可能致癌”。实际上，二氧化硫在全世界都是广泛使用的食品添加剂。可以“含有”二氧化硫的食品，比大家想象的多得多。作为食品添加剂，二氧化硫有多种功能，最重要的是还原性。它能把一些色素漂白，也能够抑制多酚的氧化从而避免褐变。比如葡萄酒，没有抗氧化剂颜色就会逐渐变深，而竹笋、蘑菇等，不进行“护色”很快就变黑。此外，二氧化硫能杀菌，具有防腐能力。干果、干蔬菜、调料粉等食物也常通过二氧化硫熏蒸来防腐。不同食物中允许的二氧化硫残留量高低不等，葡萄酒和果酒允许的含量比较高。其他食品中的残留量通常要低一些，而且食用量通常也比较小，导致“超标”的可能性不大。国家标准限制的是“二氧化硫的残留量”。也就是说，不管添加量多少，只要最后的残留合格就不会对人体造成伤害。

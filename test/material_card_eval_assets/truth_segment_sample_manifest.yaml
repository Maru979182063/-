      material_text_override: 不管刺激群众想象力的是什么，采取的形式都是令人吃惊的鲜明形象，并且没有任何多余的解释，或仅仅伴之以几个不同寻常或神奇的事实。有关的事例是一场伟大的胜利，一种大奇迹、大罪恶或大前景。事例必须摆在作为一个整体的群众面前，其来源必须秘不示人。上千次小罪或小事件，丝毫也不会触动群众的想象力，而一个大罪或大事件却会给他们留下深刻的印象，即使其造成的危害与100次小罪相比不知小多少。就是几年前，流行性感冒仅在巴黎一地便造成了5000人的死亡，但是它对民众的想象力几乎没有任何影响。原因在于，这种真实的大规模死亡没有以某个生动的形象表现出来，而是通过每周发布的统计信息知道的。相反，如果一次事件造成的死亡只有500人而不是5000人，但它是在一天之内发生于公众面前，是一次极其引人瞩目的事件。由此可知，影响群众想象力的是事件发生和引起注意的方式。

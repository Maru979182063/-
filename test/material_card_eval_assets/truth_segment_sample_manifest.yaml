      material_text_override: 一段时间以来，医疗科普短视频走红，越来越多医生通过镜头传播知识。然而，随着流量带来巨大商机，个别打着“健康科普”旗号的短视频出现传播虚假信息的情况，部分视频账号内容陷入庸俗化。有内容创作者为了商业利益，夸大健康产品功效，影响了科普内容的可信度。还有个别创作者为迅速获得关注，采用过度戏剧化的表现手法甚至虚假摆拍。医疗科普短视频市场良莠不齐，普通人很难辨别其真实性、专业性、科学性，可能产生误导、耽误病情等不良后果。究其原因，既有市场竞争激烈的影响，也有算法驱动的引导，还有监管资源和手段的局限。

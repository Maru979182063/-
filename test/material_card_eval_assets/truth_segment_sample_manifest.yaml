      material_text_override: 从时间的精密测量与相对论的密切关系，我们可以感受到万物相同的奥妙。根据广义相对论，地面（或任何星球）上的两点之间，如果高度不同，时间流逝速度就会有所不同，高处略快，地面上每米的高度差，时间流逝差异为一个定值，这意味着，只要用原子钟精确测量两点的时间流逝的差异，就能推测两点的高度差异，这进一步表明，原子钟在测地学、水文学里都会有巨大的应用潜力。

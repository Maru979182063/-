      material_text_override: 高血压是一种疾病，也是心脑血管疾病的重要诱因。基于中国社会特有的看病就医环境，很多人对于高血压的认知并不到位，对于高血压导致的短时身体难受，会以硬扛、临时休息等方式来解决，并将其作为一种自限性疾病来看待，这使得部分人群忽视了对高血压的早前干预，加之高血压在部分人群身上并没有明显不适症状，特别是对中青年群体而言，这一群体认为自己年轻、身体素质较好，不会有高血压，或是在已知自身有高血压之后觉得有足够的身体资本去应对，从而导致中风等意外发生。从这一角度出发，调低成人高血压诊断界值无异于向相关人群发出健康警告，提示人们应该重视自身健康状况，向更加自律健康的生活方式转变。

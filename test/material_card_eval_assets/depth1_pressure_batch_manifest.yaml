        作为新兴的农村商业中心，市镇并不以政治中心为依托，而是基于商业和市场活动兴起，又以商品经济体的形式发展，因而具有鲜明的经济中心的特征 就发展趋向而言，由于较少地受到政治因素的控制和干扰，市镇有着较州县城市更大的自主发展空间

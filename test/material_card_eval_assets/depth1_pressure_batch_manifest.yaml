      material_text: 我们今天的一切，最初是如何开始？作为中国人，我们何以成为我们？中国何以成为中国？这一切都需要从源头说起。源头也许是一片混沌，盘古、女娲、伏羲、燧人氏、神农氏，甚至黄帝、炎帝、蚩尤······大都是虚幻飘渺的，但这些来自古人接力式的想象绘就的神话传说，融入了历代中国人对世界的观察、思考和判断，以及试图解释自己是谁、从哪里来的初心。了解他们，我们才能更好了解民族的来时路。

      material_text: 在中国历史上，祖先崇拜成为中华民族生活中一种强烈的信仰，也是宗族结合的精神支柱。就儒家的生物性延续而言，“家族”是祖先生命延续的具体表现；就百姓而言，家族是供给祖灵必需品最稳固的社会团体。所以，家族成为连续过去与未来的一环，一个人死后是否能成为祖先，并不因为他的死亡，而是因为他有后嗣。因此，中国文化中的生生不息的概念，就是在这代代相传，叶落归根，香火不断地循环往复中表现出来。费孝通先生曾说，“任何一个到中国乡村里去观察的人，都很容易见到农民们怎样把土里长出的，经过了人类一度应用之后，很小心地又回到土里去。人的生命并不从掠夺地里得来，而只是这有机循环的一环”。也正因为如此，乡村里从来不缺人才和资金，因为人才和资金即使外流到城市，最终还会循环回来，成为滋养乡村的营养。因此，那个时代的城乡一体是真正相互循环的一体，它们之间连接着的是情感、灵魂和牵挂。

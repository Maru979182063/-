      material_text: 上学是为了接受好的教育，但正如储蓄不能转化为投资，上学也并不意味着一定能接受好的教育，我们之所以送孩子上学，不是因为孩子必须上学，而是因为他们要为未来生活做好充分准备，上学是一个人为实现人生目标而必须经历的过程，在这个过程中，最重要也是最首要的是：认识到自己未来会成为什么样的人，做到这一点并不容易，人的一生虽然漫长，能做的事情看似很多，其实真正能做的只有一件而已，这件事就是一个人来到这世间的使命。教育的价值就在于孩子心中的潜能，帮助他们找到隐藏在体内的特殊使命和必定要做的那一件事。

      material_text: 在一定意义上说，一个城市的文明程度，不是取决于有多少高楼大厦、人文景观，而是取决于它让人感受到的舒适“温度”。城市的“温度”源于自然之美，更源于风物之美。景与城、建筑与自然，和谐共生，美美与共，城市才能别具情怀，因有气度而有温度。城市的“温度”，不仅在风物之美，也在于精神之美。城市是文化的容器、记忆的载体。一座城市吸引人的，短期而言是旖旎风光，长久而言则是其独特的精神气质。

      material_text: 我国古代墙壁就实体墙的发展而言，最早最普遍要数夯土墙，古代夯土技术始于原始社会晚期奴隶社会时期获得了巨大的发展，春秋时期已经达到成熟阶段，从商代开始出现了版筑夯土城墙殷商时代，不论官宦还是墓葬，常用版筑来修建，战国时期也有许多城墙是版筑的，燕下都的版筑城墙如今还保存，此后直到元代，绝大多数的城墙仅在底部用砖包砌一段砖墙其他部位仍为夯土墙，明代开始才普遍出现了用砖包砌夯土的砖砌城墙，著名的万里长城虽在明代多改为砖石垒砌，但是城墙内部仍为夯土墙。河南郑州和河北菜城台西的商代建筑遗址的土墙，是现知居住建筑中采用夯土墙较早示例。

      material_text: “自古人生于世，须有一技之能。我辈既务斯业，便当专心用功。以后名扬四海，根据即在年轻。”戏曲节目一开场，小演员们在舞台上高声喊出这几句话。有网友说，在他们身上看到的真诚与努力，实在让人感动。这几句话源自著名京剧科班富连成的训词。戏曲行业有其特殊性，讲究科班出身、练童子功，但“以后名扬四海”所代表的美好期待，也是各行各业年轻人的共同憧憬。而不管具体的梦想是什么，追梦的路上总离不开“专心用功”。

      material_text: “自孩子出生后，我就开始购买各类绘本，如布书、洞洞书、触摸书、贴纸书······有的书已翻了上百次。”任女士经常在社交平台分享自己为孩子选书的心得，她向调研组表示，孩子虽然刚上一年级，但学校每周都有读书课，也会要求家长和孩子在家期间完成一些亲子阅读任务。任女士回忆自己小时候，还很少听闻“亲子阅读”的提法，而现在其已成为一项非常普及的家庭活动。在本次调研收集到的1610份有效问卷中，超九成受访父母与孩子有过亲子共读的经历。此外，调研还发现，即便没有学校布置的亲子阅读相关任务，也有78%的受访父母会主动开展亲子阅读活动。近年来，亲子阅读不仅成为全民阅读实践的新潮流，还促进了家庭教育观念的转变。“一起读书不仅让我和孩子的关系更亲密，而且我们也能从书中得到丰富的知识与体验”，北京的安女士认为亲子阅读不仅是一项家庭活动，更是一种有益的教育方式。

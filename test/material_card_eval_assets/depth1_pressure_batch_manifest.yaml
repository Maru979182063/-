      material_text: 新媒体背景下，日益发达的网络对少数民族濒危语言的冲击是显而易见的。从某种程度上，较严重的影响更多地表现在只有语言而未形成文字的濒危语言上。在我国，有的民族没有自己特有的文字，这些少数民族人口数量占有一定比重。他们的语言延续的唯一途径只能依靠口耳流传。随着新媒体时代的发展，各种高科技产品扑面涌来。在互联网和信息媒介方面，语言种类也受到了巨大影响，使用本民族语言的频率就更加少了。新媒体背景下，这种发达的互联网在一定程度上严重影响了人们的交流方式，进而使得越来越少的人使用自己的语言。

      material_text: 当前，在宏观经济政策力促经济复苏中，一系列促消费、扩内需，激活市场最细微经济体活力的刺激措施接连出台，并且初现效果。后备箱经济就是其中之一。后备箱经济实际上是“夜市摆摊”的“新玩法”“新形态”。一个个特色鲜明的后备箱摊位，让人感受到新鲜消费体验带来的“烟火气”和“新潮味”，既是城市的一道新风景，也是拓展消费场景、提振消费活力的“微创新”。它是年轻人的潮玩集市，让疫情下原本疏远的社交距离缩短了许多。在此意义上，后备箱经济所具备的不仅仅是经济功能，而是同时兼具社交、文化功能。从微观角度来说，它的存在，可能改善低收入者的生活水平。从宏观层面来看，这也是灵活就业、自由就业的一种形态。

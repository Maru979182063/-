      material_text: 深海水压巨大，黑暗阴冷，不仅人类无法生存，而且大部分地球上的生物也无法适应深海环境 除了环境恶劣外，深海还是一个缺乏能量和资源的地方。由于阳光无法穿透几百米深的海水，所以光合作用基本上局限在不超过200米的深度范围之内
        对于地球上大部分生物而言，其能量的终极来源是光合作用 因此，深海中的生物基本上都需要依靠海面附近的“产出物”维持生存 有些在深海中生存的动物可以上浮到浅海觅食，而更多的局限于深海或者海底的动物只能等待从上层沉降下来的“海洋雪”——海面生物的尸骸或者粪便形成的聚合物
        “海洋雪”是海底生物主要的有机质的来源。如果一头鲸的尸体沉入海底，对附近的深海动物而言不啻于一场几十年未见的盛宴，可谓“一鲸落，万物生”

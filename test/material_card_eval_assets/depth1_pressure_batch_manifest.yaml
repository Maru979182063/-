      material_text: 在一个全媒体的高科技时代，随着当代观众审美需求的提升，戏剧创作不能再仅仅从创排有一定思想内涵的作品着眼，而需兼带思考如何变换表演形式和传播方式以争取更多的观众，尤其是全媒体时代成长起来的当代年轻观众。就线上演出而言，未来的戏剧很可能出现在虚拟剧场——观众可以进入线上戏院，选择不同的剧种、剧目，戴上高科技视听设备进行观赏。就如我们看足球世界杯比赛，并不需要到现场才能观看，对于全球数以亿计的足球迷来说，能够看现场比赛的是少数，好在，线上比赛的精彩程度并不比现场要差，有时现场看不清楚的细节还要问线上的观众。如今，直播重要的体育赛事已成为一门独特的技术甚至艺术。

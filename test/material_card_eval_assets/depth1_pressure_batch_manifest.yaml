      material_text: 现藏宝鸡青铜器博物院的四十三年逨鼎，共有10件，其中8件内壁铸有相同的铭文，单篇316字。铭文为我们还原了2800多年前的一场隆重的册命过程，通过繁复的仪式，单逨被周宣王任命为官司历人。同时，铭文也成为中国历史上第一次有记录的“任前廉政谈话”。在这次“谈话”中，周宣王对单逨提出了四个告诫：一是施政办事要谨慎，不能贪图安逸，放纵自己；二是要带头遵守各项规章制度，严格依法行政；三是审理案件要明辨是非，不偏不倚，确保司法的公正性；四是要廉洁自律，不得以权谋私。
        填入文中横线处最恰当的一项是审理案件要明辨是非，不偏不倚，确保司法的公正性。

      material_text: 有没有一个概念能够标识中国古代文人士大夫阶层的美感与审美愉悦？有，这就是清乐 “清乐”这一概念产生于北宋。大约从公元1060年到1100年40余年间，也就是从宋仁宗后期到宋哲宗在位的时期内，文人士大夫群体滋长起了对一种“精神愉悦”的肯定、颂扬与培育，这种精神愉悦被命名为“清乐”（也称“清欢”）
        “清乐”一词所指称的那种审美愉悦，说明宋人清楚地认识到了自己正在进行一种非功利的、纯粹的审美活动，通过“清”与“乐”前所未有的结合，宋人将审美愉悦和其他可能包含有功利目的的“乐”明晰地区分开来

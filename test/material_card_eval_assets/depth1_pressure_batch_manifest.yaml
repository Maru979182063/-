      material_text: 人们常说，语言使人类与动物相区分，文字则使文明与野蛮相区分。 显然，文字是人类进入文明社会的重要标志，可谓文明的灵魂。遗憾的是，文字的重要性远远没有得到应有的认识。
        什么是文字呢？在一些西方学者看来，文字只不过是记录语言的符号。 对上述语句排序，最连贯的一项是 。 现代语言学之父索绪尔曾经指出，“语言和文字是两种不同的符号系统，后者的存在只是为了表现前者”。
        换言之，文字存在的唯一理由就是表现语言，因此语言是第一性的，文字是第二性的，文字只是语言的附庸。 这种观点根深蒂固，导致人们推崇语言、贬低文字，文字的重要性被人们忽视。

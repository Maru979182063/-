      material_text: 银发经济又称为老年经济、银色经济、乐龄经济等，是面向全体老年公民的生产、分配、流通和消费等一系列经济活动的总称。 1999年，我国60岁及以上人口占比达到10%，正式步入老龄化社会，老龄化问题在国内开始得到广泛关注。
        近年来，我国银发经济发展很快，总体上呈现如下特点：市场规模巨大、消费人口规模超大、消费结构升级速度快、产业融合和行业细分趋势超强。 虽然我国银发经济市场空间大、发展速度很快，但总体上我国银发经济尚处于“青春期”，即发展的初级阶段，还存在不少问题亟待研究解决。
        例如，老年康养相关专业技术人才紧缺，这主要是受到职业认知、员工待遇以及劳动强度等多重因素影响。

      material_text: 尽管塑料对大多数生物体有毒，但它却是某些类型细菌和真菌的食物。这些细菌和真菌存在于土壤、海洋中，它们利用专门的酶来分解不同类型的塑料。以塑料制品中常见的PET为例，PET的降解产物有两种不幸的是，它们进食效率很低对苯二甲酸和乙二醇，土壤和水体中都有两种恶臭假单胞菌菌株，其中一种菌株恰恰就特别喜欢吃对苯二甲酸，另一种则特别喜欢吃乙二醇。不幸的是，它们进食效率很低。于是，科学家用基因工程修改了这两种菌株的遗传物质，通过插入或删除某些基因片段，加快它们“咀嚼”塑料的速度，或者添加某种酶，让被它们分解的PET更快、更多地转化为可生物降解的有用材料。

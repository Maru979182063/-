      material_text: 在皮肤表面生活着许多微生物群落，比如表皮葡萄球菌，这些微生物一旦入侵皮肤下层将会引起炎症，但在表层或者皮肤外层的时候则不会
        研究者们将葡萄球菌LTA注射到小鼠表皮层，然后损伤它的皮肤 对比结果表明，注射过葡萄球菌LTA小鼠的皮肤炎症比没有注射过的轻得多 进一步深入研究发现，LTA能够抑制白介素6和肿瘤坏死因子的分泌。过量的白介素和肿瘤坏死因子则是导致炎症产生的罪魁祸首

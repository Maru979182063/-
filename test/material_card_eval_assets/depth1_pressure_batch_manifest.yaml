      material_text: 在一项实验中，科研人员向志愿者宣称，该实验旨在观察人们对身体有缺陷的陌生人作何反应。化妆师在志愿者左脸做出一道血肉模糊的伤痕，志愿者被允许用一面小镜子看一下化妆效果，然后，化妆师表示需要在伤痕表面再涂一层粉末，以防止它被不小心擦掉，实际上，化妆师用纸巾偷偷抹掉了化妆的痕迹。对此毫不知情的志愿者被派往各个医院，观察人们对其面部伤痕的反应。规定的时间到了，返回的志愿者竟无一例外地叙述了相同的感受——人们对他们比以往粗鲁无理、不友好，而且总是盯着他们的脸看。

      material_text: 推动产品和文化飞入寻常百姓家，回归俗世烟火，是大同铜器坚持的一条传承保护路子。 工艺铜火锅是最具代表性的例子。 它不只是作为艺术品进博物馆、进美术馆、进校园，做摆设、展示，还作为生活用品进入百姓家庭，端上餐桌。
        这种艺术气与烟火气兼具的保护之路，除了火锅本身所具有的“烟火气”特性外，很重要的一点是其满足了大众的心理期许。 工艺铜火锅的装饰设计、内涵意蕴承载着当地悠久的民族文化及饮食文化的精髓，让人油然而生一种认同感和亲近感。

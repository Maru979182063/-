      material_text: 汽车是工业社会发展至今最复杂的工业产品，是数以千计机械部件的精密集合体 发动机为了持续提供稳定的动力，需要曲轴、机油过滤器、交流发电机、风扇、分电盘、阀门、线圈和气缸等零部件的配合
        而发动机产生的动力，需要通过离合器传递到齿轮与传动轴，驱动车轮转动 因为这么复杂的机械结构，机械汽车在完成任何一个动作时，都需要经过无数道机械关卡的传递
        每一个零部件，都会增加动力的损耗 因此普通内燃机车只能将燃料效能的转化为动力，大部分能量都在通过复杂机械部件的过程中，以热辐射、对抗风阻、制动摩擦等其他机械功能耗散掉了

      material_text: 消极冒险行为是指适应不良的冒险行为或问题行为。根据生态系统理论以及以往的研究，家庭与同伴是影响青少年冒险行为的重要环境变量。其中家庭功能是评价家庭环境好坏的重要因素之一。家庭功能发挥越好，青少年的问题行为越少。相关研究也表明，家庭功能发挥良好可以减少青少年的物质滥用。随着青少年与同伴交往时间的逐渐增多，同伴成为影响其发展的另一个重要环境因素。根据差异交往理论，如果经常与不良同伴交往在模仿学习下也产生不良的态度和行为表现。实证研究也发现，不良同伴交往会增加青少年的吸烟饮酒、暴力攻击行为、违法犯罪以及反社会行为等。

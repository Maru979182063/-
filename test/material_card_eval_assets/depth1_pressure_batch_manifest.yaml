      material_text: 很多人认为，生病就应该用最直接有效的药物控制症状，迅速把问题扼杀在摇篮里，因为一旦产生并发症，身体可能就要遭受更严重的折磨
        这当中，病毒或细菌是最大的麻烦制造者，它们的入侵几乎不可容忍 但是，很少有人从一个系统的角度去思考，人们为什么会生病 深入研究，科学家总会发现，这好像不是一次简单的“攻击和防御”过程
        从演化的角度讲，生病可能是我们的身体为了达到另一种目的所产生的一种妥协 当然，这个论断并不是要否认现代医学，而是希望从另一个侧面，再想一想：在我们会生病的这种机制背后，可能另有隐情

      material_text: 中华民族富有哲学思维的传统，中华文化蕴含深邃的哲学思想，这种特征表现为思想行为以个人认识为前提，观念形成以经验活动为前提。虽然中国哲学学科的自觉意识产生于西方哲学传入之后，但中国人的思维方式却始终是哲学式的。中国人的思想特征和智慧特点之间存在着一种相互对应：个人认识活动是以在身边所发生的事情为根据和出发点的，因此，中国人的思维具有经验归纳的特征；而经验活动本身又是为了更好地认识整体和全局，所以中国人的思维又具有抽象普遍的意义。
        填入画横线部分最恰当的是中国人的思维又具有抽象普遍的意义。

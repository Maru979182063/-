      material_text: 即时零售是快速兴起的新业态，其被大众广泛接受，主要源于三个优势：一是配送效率，即时零售通过集成数字平台、属地供应链和即时配送体系，仓储、分拣、配送等配置能力较传统配送模式更高，能更好满足消费者对“快”的需求；二是便利溢价，在极大节省时间成本的前提下提供更多商品选择，满足消费者“用钱换时间”的需求；三是消费黏性，即时零售品类多样，易于培养消费者习惯，提升渠道消费和商品消费黏性。

      material_text: 2024年中央一号文件提出，鼓励各地因地制宜大力发展特色产业，支持打造乡土特色品牌。深刻把握我国居民食物结构调整的变化趋势，牢牢树立大食物观，全力抓好传统重要农产品稳产保供的同时，积极挖掘和培育乡土新产品，完善乡土特色产业产销链条，形成多元化的乡土特色产品供给体系。加快新“土特产”培育。聚焦各地农业资源禀赋，顺应消费结构升级趋势，抓好传统优质农产品供应，利用现代化技术推动农产品精深加工。加快“土特产”新品种研发，促进品种结构迭代升级，提升产品营养结构，争取更多优质农产品打入高端市场。发展现代设施农业。鼓励农户开展农产品跨区种养、错季生产，推动农业由传统种养向设施农业转变，在育种、栽培等多环节技术赋能，突破自然条件限制，推动更多具有浓郁地方特色的乡土产品走出传统农业主产区、融入全国大市场。强化“数商兴农”。加强数字技术应用，提升乡土产品数字化、智能化能力，构建乡土产业链数字化新生态。按照2024年中央一号文件提出的“发展乡村土特产网络销售”要求，加快完善农村冷链仓储、冷链运输、冷链配送网络，培育一批“小而美”的农村电商特色品牌，促进更多“土特产”线上线下热销。

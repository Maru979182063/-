      material_text: 当经过我们身边的秋风，一阵冷似一阵，我们会自觉地添加衣裳，这是一种本能。那么，没有脚不会移动、没有御寒服的植物们，面对秋风和接下来的“一场秋雨一场寒”，该如何应对？变色，是大部分落叶植物首先采取的御寒法宝。反过来说，当树叶开始变红、变橙或者变黄时，都可以看作是寒冷即将来临的预告，即所谓的“一叶知秋”。说起秋天的红叶，总也绕不开其代表“红枫”。现在我们知道，染红枫叶的，既不是“酒”，也不是“血”，而是秋天本身变色，是大部分落叶植物首先采取的御寒法宝秋天的光照、越来越大的日夜温差，以及秋天的环境温度等。当然，秋天不仅仅只染红枫，还会为许许多多植物，涂抹出与其他季节里完全不同的“妆容”，也“渲染”出了一个植物大类变色，是大部分落叶植物首先采取的御寒法宝“秋色叶树种”。

      material_text: 广绣，一针一线绣出绝世风华；粤剧，一腔一调道尽人间百态；醒狮，一招一式彰显精神气质······粤港澳三地同根同源，以粤剧、龙舟、武术、醒狮等为代表的岭南文化是三地共通的文化语言，承载着浓厚而丰富的湾区共同人文记忆，让共建人文湾区有了坚实的文化和社会基础，也彰显出湾区人文精神的独特魅力。正如香港艺术学院前院长所说，“在11个城市的共同努力下，湾区文化能够很快熬成一锅精彩滚热的‘高汤’”。佛山的武术传统，加上香港的电影艺术，产生了“叶问”电影系列；广东的舞狮传统，加上动画科技，产生了动画《雄狮少年》，再由广州大剧院搬上音乐剧舞台······粤港澳三地在赓续不断的文化交流与交融中，促进民心相通，坚定文化自信，勾勒出一幅幅人文湾区的魅力画卷。

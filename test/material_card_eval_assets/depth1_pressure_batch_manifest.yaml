      material_text: 据专家预测，到2060年，我国风电、太阳能发电占比将超过50%，成为电量供应的主体。随着风电和太阳能发电比例的快速上升，问题也随之而来。由于光伏发电完全依靠太阳光源，发电时间受到日出日落的影响，导致其发电的高峰期主要集中在白天，夜晚几乎处于停滞状态，不能满足傍晚及夜间对能源的需求高峰，此外，阴雨天气下，光伏发电效率也将显著下降。风力发电高峰则在一天中很不稳定。
        填入文中画横线部分最恰当的一项是随着风电和太阳能发电比例的快速上升，问题也随之而来。

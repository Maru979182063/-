      material_text: 近年来，科学家们在亚马孙河流的上游发现来自下游的一种名为锆石的沉积物。 有的人惊呼这是亚马孙河倒流！可是亚马孙河真的曾经倒流吗？
        人们都说亚马孙河发源于南美大陆西海岸边缘的安第斯山脉，但其实几千万年前或许并非如此，证据就是这种来自亚马孙河底部的沉淀物锆石。 锆石是一种细小的矿物质，它来自许多早已化为尘埃的古代山系，在沧海桑田的变化中，地质学家们常通过检测锆石来判断山脉河流的年龄。
        美国地质学家发现亚马孙河河底的锆石年龄在13亿到21亿年，但安第斯山脉只有几百万岁，这表明亚马孙河流域的矿物质不可能来自年轻的安第斯山脉。 更让人惊奇的是，亚马孙上游虽然紧靠安第斯山脉，但河底的岩石颗粒与安第斯山脉的岩石并不一致，反而与河流中下游的岩石属同一种类，也就是说亚马孙河上游底部古老的沉积物或许来自大河的下游。

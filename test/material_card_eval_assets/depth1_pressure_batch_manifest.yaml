      material_text: “成功老化”以一个全新的积极视角传达出即使步入老年也能获得成功的信念。“成功老化”最早指老年人具有内在幸福感并满意自己目前和过去的生活，能抵抗传统老化带来的衰退。后有学者指出，成功老化不仅要强调生活满意度，还应明确老年期的成长和进步。此后又强调了老年人躯体健康的维持，并加入心理和社会功能的维度。20世纪末对成功老化的定义受到的关注最多且极大促进了该领域的研究。研究者区分了常规老化（非病理性但有高患病风险的个体）和成功老化（低患病风险且高功能的个体）。

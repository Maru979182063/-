      material_text: 人民是文艺创作的源头活水，火热的生活是取之不竭的创作源泉，文艺的生命力始终根植于人民生活中，一切文艺的创新，归根结底都直接或者间接来源于人民，文艺一旦离开人民，就会变成无根的浮萍、无病的呻吟、无魂的躯壳。不能否认，当下一些文艺类别里，存在不少抄袭模仿、千篇一律的问题，机械化生产和快餐式消费，让不少文艺作品的思想性和艺术性大打折扣，有数量缺质量、有“高原”缺“高峰”的现象，限制了文艺的生命力，难以满足群众文艺需求。对这些问题必须重视，
        艺术只有与人民同在，才能获得无穷的力量、焕发蓬勃的生机。 填入上文横线处的句子，最恰当的是要用生活之源育艺术长青。

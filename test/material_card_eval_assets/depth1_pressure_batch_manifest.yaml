      material_text: 电商平台上一款名为“爱因斯坦的脑子”的商品，近期月销上万份。这是种虚拟商品，购买后，商家提供一次“注入智力”的娱乐聊天服务。这类带点搞笑意味的虚拟商品花样繁多，如每年七夕、情人节订单火爆的“孤寡青蛙”。从它们单价不高、迭代迅速、有创意、有话题性的共性来看，这类虚拟商品本质是年轻人用来解闷的工具。虚拟商品背后，年轻人在其中的另类情绪自救，才更值得一说。譬如，“爱因斯坦的脑子”，在现实生活中对应的是缓解学业焦虑，“孤寡青蛙”对应的是消减单身孤独感···这些用小成本换取的“即刻愉悦”，对年轻人来说是有意义的。

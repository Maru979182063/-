      material_text: 从能量角度而言，越活泼的金属能够释放出的能量越多，制造成电池所储存的能量也就越多。就锂离子电池而言，锂活动顺序大致在钠与镁之间，重量又轻，可成为理想的储能电池原料，因此，锂电池在我们的日常生活中十分常见。但事实上，锂离子电池从发明到商用的过程并非一帆风顺，原因是性质活泼的金属虽然能够储存并释放更多的能量，但其活泼的另一面则是稳定性差，这就给应用带来相应的困扰。

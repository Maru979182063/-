      material_text: 自从人造树胶问世以来，全球塑料产量已超过83亿吨 然而，随着塑料的广泛应用，大量塑料废弃物被弃置于垃圾填埋场或环境中 由于管理不善，这些废弃物会分解并释放有害化学物质，进入食物链，污染各级生物
        研究表明，直径小于5毫米的微塑料对人类健康和生态系统构成潜在威胁 其积累可能引发遗传毒性、免疫反应和氧化应激等问题，目前已在肺部、血液、胎盘等人体多个部位被发现

      material_text: 饱腹，是人类生存的第一要素。但如何用有限的土地，养活不断增加的人。在1908年之前，是一个巨大挑战。曾经，许多科学家试图将空气中的氮提供给植物，但结果多是徒劳的，直到德国化学家弗里茨·哈伯发现了一种合成氮的方法。基于这一开创性的发现，弗里茨·哈伯和卡尔·博世联合开发了被诺贝尔奖肯定并最终改变了历史的哈伯·博世氨生产工艺。它带来了前所未有的农业生产革命。从此，农业生产进入崭新的篇章。通过使用廉价的氮肥、农业生产力大幅度提高，所产生的粮食能够供给日益增加的人口，而粮食的价格，也不断降低，使得更多的人可以负担得起。

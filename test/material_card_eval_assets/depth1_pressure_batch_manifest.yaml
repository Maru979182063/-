      material_text: 目前，估计癌症患者的生存率主要取决于他们的癌症分期。实际上除了分期标准之外，还有许多其他因素可能会影响患者的生存。研究人员使用机器学习方法，创建了称为“癌症生存计算器”的原型工具，并在大型数据集上对其进行了测试。初步测试估计了乳腺癌、甲状腺癌和胰腺癌患者的5年生存率。尽管肿瘤大小等一些预测因素是癌症分期的一部分，但研究结果表明，还有更多因素影响癌症患者在疾病阶段之后的生存。研究人员报告称，该计算器对于所有3个癌症部位的生存率估算都“高度准确”。同时，它的优势在于数据集更全面，而且使用了新的机器学习数据模型，处理速度更快，风险预测也更准。

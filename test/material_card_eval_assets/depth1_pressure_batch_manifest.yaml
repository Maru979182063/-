      material_text: 近年来，得益于公共交通建设的不断发展，老年人搭乘公共汽电车、城市轨道交通已经可以满足日常大部分出行需求 但是，公共交通服务的获得往往无法与老年人形成无缝衔接，老年人的“第一公里”出行难问题仍客观存在
        比如，虽然网约车出行的普及率不断提升，但老年人使用手机打车出行仍面临不会叫车、叫不到车、找不到车、不会支付等多重现实问题 老年人“第一公里”出行难题，涉及老龄化社会的应对和公共交通的发展完善等多个方面
        解决“第一公里”出行难的问题，实际就是要增强公共交通对老年人群体的可用性和可及性，还需公共部门、市场主体等针对老年人的出行特点和现实需求，协力创新服务方式

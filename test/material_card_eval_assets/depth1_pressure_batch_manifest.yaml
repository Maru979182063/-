        假设你患有糖尿病，那么，根据你设置的最初过滤级别，所有带有“糖尿病”一词的邮件都会进入“垃圾邮件”文件夹 但渐渐地，随着你将越来越多的电子邮件（包括“糖尿病”一词）标记为“合法”算法会重新校准已构建的邮件过滤规则

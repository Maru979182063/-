      material_text: 大国经济的重要特征，就是必须实现内部可循环，并且提供巨大国内市场和供给能力，支撑并带动外循环。我国已经形成拥有14亿多人口的全球最大最有潜力市场，随着向高收入国家行列迈进，规模巨大的国内市场不断扩张。新形势下，构建以国内大循环为主体、国内国际双循环相互促进的新发展格局，是把握未来发展主动权的战略性布局和先手棋，是贯彻新发展理念、促进大国经济发展的重大举措。

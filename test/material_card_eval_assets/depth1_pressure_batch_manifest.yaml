      material_text: 自从第一次睁开眼睛观察世界，光就陪伴我们的生命旅行。光是人类生存生活的基本条件，为我们呈现绚丽斑斓的世界，光合作用则为我们提供了食物来源。人类对光的认识和研究从未停止过。从盘古开天地到后羿射日，古代典籍中有许多关于光的记载。春秋战国时期，墨子论述了光的产生和性质，甚至描述了小孔成像现象。如今，光既是科学前沿又是应用前沿，与光有关的先进科技在人们的日常生活中普遍应用，光通信、量子通信还开创了人类通信的新前景。在载人航天、探月工程、深空探测、大气——海洋——陆地观测领域的重大科技任务中，光学研究尤其是红外光学研究起到关键作用，为推动国民经济发展、维护国家安全提供了强有力的支撑。

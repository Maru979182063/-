      material_text: 生态环境立法具有以问题为导向、综合各种法律调整手段的“领域法”性质。这意味着作为“领域法”，生态环境法典具有既不同于民法典以民事权利为主线、以意思自治为核心价值、以裁判规则为主的逻辑结构，也不同于行政法典以行政权力为主线、以依法行政为核心价值、以管理性规范加行政程序为主的逻辑结构，而是以生态、环境、资源三个方面的法律问题为主线，以人与自然和谐共生为核心价值，融管理性规范与裁判性规范、实体性规范与程序性规范于一体。

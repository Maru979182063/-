      material_text: 老鼠被人类围追堵截了千百年，为什么没有灭绝呢？因为老鼠的数量庞大，而老鼠的数量之所以庞大是因为老鼠具有极强的繁殖能力。任何一种动物在生态系统之中都不是独立存在的，它的存在与整个生态系统的稳定平衡有着密切的关系。当然，在一个生态系统中，不同生物的重要性是不同的，那么哪一种动物是最为重要的呢？举例而言，一只老虎一年要吃掉100只以上的羊，而这些羊每年又要吃掉10万斤以上的草，在这个食物链之中，草才是最为重要的。如果草没有了，羊就没有了食物，羊没有了，老虎也就没得吃了。同理，老鼠的数量极为庞大，在自然界之中，有大量的动物是以老鼠为食的，如果老鼠灭绝了，以老鼠为食的大量动物都会面临灭绝的危险，而且，与老鼠处于同一生态位的其他竞争者数量可能会陡然增多，如此又会带来新的生态系统振荡，甚至有可能导致整个生态系统的崩溃，这并不是危言耸听，生态系统的稳定平衡是非常微妙的，看似牢不可破，却又十分脆弱。

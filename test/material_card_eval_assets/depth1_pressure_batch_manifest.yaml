      group_key: center_understanding||特殊题型||寓言故事
      material_text: 在南太平洋加拉帕戈斯群岛，有一处海龟湾，每年6—9月，成群的绿海龟同游来此，在沙滩上繁衍后代。一次，几名旅伴在一位生物学家的引导下，来实地观察幼龟怎样离巢进入大海。他们发现了一个龟巢。只见一只幼龟把头探出穴巢，一只海鸟突兀而来，猛啄幼龟的头。这时，有人不由分说抓起幼龟投向了大海。接下来，幼龟们从巢里鱼贯而出，却引来了成群的食肉鸟类，很多幼龟被它们捕获。向导不由叹息道：“天啊！看我们做了些什么？如果不是我们，这些幼龟根本不会受到伤害。”原来那只先出来的幼龟，是龟群的“刺探”，一旦遇到危险，它会返回巢穴。先出来的幼龟被扔进了大海，巢中的幼龟以为外面很安全，得到错误信息才倾巢而出。

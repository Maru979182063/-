      material_text: 所谓“简牍”是用来书写的竹、木的统称。一般来说，以竹子为载体的称为“简策”；以木头为载体的叫作“版牍”；但也有以木作简称木简的。具体而言，一根竹片叫“简”，把若干竹片编起来叫“策”，又叫“册”。在东汉年间的《说文解字》中，在东汉年间的《说文解字》中，“册”是象形文字，像一长一短，中有二编之形。一根简容不下许多字，长文章必须用许多简编成策。编简成策的绳子叫作编，一般用麻绳，也有用皮绳或用丝绳来编连单根的简。一块木板叫“版”，写有文字叫“牍”。如果是一尺见方的牍，叫作“方”。一般不到100字的短文可写在版牍上，长文章则用简册。版牍主要用于写录物品名目或登录户口、编制地图和通信等，所以古人常用“版图”代表国家的领土。

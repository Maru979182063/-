        但现在更酷的是：虽然算法的训练数据是一组普通的电子邮件，但你的日常行为也将教会它识别你感兴趣的事情—算法会根据你所发出的邮件做出判断 假设你患有糖尿病，那么，根据你设置的最初过滤级别，所有带有“糖尿病”一词的邮件都会进入“垃圾邮件”文件夹
        但渐渐地，随着你将越来越多的电子邮件（包括“糖尿病”一词）标记为“合法”算法会重新校准已构建的邮件过滤规则 将这类邮件所对应的概率降至远低于95%的水平，这类电子邮件就会正常地进入收件箱而不是“垃圾邮件”文件夹

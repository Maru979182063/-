      material_text: 有“基因剪刀”之称的CRISPR基因组编辑技术，被认为是生命科学领域的革命性技术 但英国某研究所研究人员警告说，使用CRISPR会导致细胞出现先前没有预料到的基因组损伤，基于该技术开发基因疗法可能存在安全隐患
        先前研究表明，使用CRISPR编辑基因组时，目标位点处并未出现许多无法预见的突变 但在利用小鼠和人类细胞开展的进一步实验中发现，这把“剪刀”实际上经常导致广泛突变，虽然这些突变都发生在距目标位点较远的地方
        因此有专家声明，我们发现（CRISPR带来的）DNA（脱氧核糖核酸）变化此前被严重低估 任何人如果想把这项技术用于基因疗法，都应谨慎行事，仔细研究可能出现的有害影响

      material_text: 当前，数字空间业已成为国与国之间竞争较量的重要场所，传播权、话语权成为国家驾驭数字空间能力的重要支撑。伴随着国家政治权力向数字空间的延伸，国际传播强大的空间穿透力，使得数字地缘政治超越了传统地缘政治的疆域和框架，引发国家之间围绕数字技术、网络安全等展开全方位布局。

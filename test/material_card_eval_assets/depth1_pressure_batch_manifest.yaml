        智能传感器是连接物理世界与数字世界的桥梁。其中，以MEMS为代表的智能传感器是传感器的发展趋势 国内MEMS产业在“机遇与挑战”中稳步前进 2020年新冠肺炎疫情爆发，国际贸易环境复杂多变，国内产业的发展面临着诸多挑战，高端芯片、EDA软件、制造与测试设备等有待发展

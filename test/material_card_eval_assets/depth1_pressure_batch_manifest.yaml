      material_text: 腓总神经损伤在临床上较常见，是指在某些因素作用下，引起腓总神经的结构或功能发生障碍 跷二郎腿时，由于上位腿的腿窝与下位腿膝盖外侧接触的部位正是腓总神经经过的地方，此时，神经便会发生嵌压
        若腓骨小头处的腓总神经长时间被压迫，则会导致腓总神经缺血、变性等，引起神经损害 其临床表现为足呈下垂内翻畸形，不能主动背屈、外翻 如病程长，小腿外侧肌肉可萎缩，出现小腿外侧及足背皮肤麻木
        若不及时治疗，会出现小腿和足部感觉、运动功能障碍，影响日常生活和劳动

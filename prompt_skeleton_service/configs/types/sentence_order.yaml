type_id: sentence_order
display_name: 语句排序题
enabled: true
aliases:
  - 语句排序
  - 排序题
  - 句群排序
  - 语段排序

task_definition: >
  基于给定句群制作真题风格的语句排序题。核心不是把 6 句机械排列，而是先确认句群
  是否具备唯一顺序依据：合法首句、自然尾句、局部绑定链、共同信息延续、指代回扣、
  递进/转折/因果落点和板块推进关系。正确答案必须同时满足“首句可起、局部可接、整体可收”。
  干扰项不能随意乱排，而应优先采用真题式误排：近邻错序、局部绑定拆错、首尾误配、
  角色顺序冲突。如果要把题做得比同档真题略难，只能增加近邻项之间的迷惑性和局部竞争，
  不能削弱唯一顺序链本身。

default_pattern_id: dual_anchor_lock

formal_runtime_spec:
  primary_business_card_id: sentence_order__six_sentence_role_chain__abstract
  sortable_unit_count:
    mode: fixed
    value: null
  sortable_unit_sentence_span:
    min: 1
    max: 2
  sortable_unit_type: sentence_block
  candidate_type: sentence_block_group
  reject_non_six_unit_sequences: false
  uniqueness_model: role_chain_only

difficulty_target_profiles:
  easy:
    complexity: { min: 0.20, max: 0.42 }
    ambiguity: { min: 0.18, max: 0.36 }
    reasoning_depth: { min: 0.20, max: 0.42 }
    distractor_similarity: { min: 0.22, max: 0.50 }
  medium:
    complexity: { min: 0.38, max: 0.62 }
    ambiguity: { min: 0.32, max: 0.56 }
    reasoning_depth: { min: 0.38, max: 0.64 }
    distractor_similarity: { min: 0.45, max: 0.72 }
  hard:
    complexity: { min: 0.56, max: 0.84 }
    ambiguity: { min: 0.48, max: 0.78 }
    reasoning_depth: { min: 0.56, max: 0.86 }
    distractor_similarity: { min: 0.62, max: 0.90 }

skeleton:
  anchor_type: sentence_group_interfaces
  operation_type: reorder
  target_type: coherent_sequence

structure_schema:
  sortable_unit_count:
    mode: fixed
    value: null
  sortable_unit_sentence_span:
    min: 1
    max: 2
  sortable_unit_type: sentence_block
  sentence_roles:
    type: enum_list
    values:
      - thesis
      - definition
      - explanation
      - reasoning
      - transition
      - example
      - conclusion
      - countermeasure
  head_constraints:
    must_not_have:
      - backward_reference
      - mid_transition
    preferred_roles:
      - thesis
      - definition
  tail_constraints:
    must_have:
      - closure
    preferred_roles:
      - conclusion
      - countermeasure
  binding_pairs:
    type: list
  ordering_logic:
    type: pattern
    examples:
      - thesis -> explanation -> reasoning -> conclusion
      - problem -> analysis -> solution
      - definition -> explanation -> example -> conclusion
  uniqueness_source:
    type: enum_list
    values:
      - role_order_conflict
      - reference_dependency
      - closure_position
      - binding_violation

legacy_slot_mapping:
  opening_anchor_type: head_constraints.preferred_roles
  closing_anchor_type: tail_constraints.preferred_roles
  local_binding_strength: binding_pairs
  middle_structure_type: ordering_logic
  block_order_complexity: ordering_logic

slot_schema:
  sortable_unit_count:
    type: integer
    required: false
    default: null
    allowed:
      - 4
      - 5
      - 6
    description: 排序题正式运行口径支持 4 / 5 / 6 句，以材料真实单元数为准

  sortable_unit_sentence_span:
    type: object
    required: false
    default:
      min: 1
      max: 2
    description: 鍙帓搴忓崟鍏冩渶灏戜负1鍙ュ彞锛屾渶澶氫负2鍙ュ彞
  sortable_unit_type:
    type: string
    required: false
    default: sentence_block
    allowed:
      - sentence_block
    description: 鎺掑簭鍗曞厓绫诲瀷锛屼粎鏀寔浠ュ彞瀛愪负鍩虹
  opening_anchor_type:
    type: string
    required: false
    default: explicit_topic
    allowed:
      - background_intro
      - explicit_topic
      - upper_context_link
      - viewpoint_opening
      - problem_opening
      - weak_opening
      - none
    description: 首句锚点类型

  opening_signal_strength:
    type: string
    required: false
    default: medium
    allowed:
      - high
      - medium
      - low
      - none
    description: 首句可识别程度

  middle_structure_type:
    type: string
    required: false
    default: local_binding
    allowed:
      - local_binding
      - parallel_expansion
      - cause_effect_chain
      - problem_solution_blocks
      - mixed_layers
    description: 中段主要结构关系

  local_binding_strength:
    type: string
    required: false
    default: medium
    allowed:
      - high
      - medium
      - low
    description: 局部捆绑关系清晰度

  closing_anchor_type:
    type: string
    required: false
    default: conclusion
    allowed:
      - conclusion
      - summary
      - call_to_action
      - case_support
      - none
    description: 尾句锚点类型

  closing_signal_strength:
    type: string
    required: false
    default: medium
    allowed:
      - high
      - medium
      - low
      - none
    description: 尾句可识别程度

  block_order_complexity:
    type: string
    required: false
    default: medium
    allowed:
      - low
      - medium
      - high
    description: 是否存在板块级顺序判断

  distractor_modes:
    type: array
    required: false
    default:
      - wrong_opening
      - local_binding_break
      - wrong_closing
    allowed:
      - wrong_opening
      - wrong_closing
      - local_binding_break
      - block_swap
      - connector_mislead
      - parallel_misorder
      - summary_misplace
      - reason_fronting
      - action_fronting
    description: 错误项模式

  distractor_strength:
    type: string
    required: false
    default: medium
    allowed:
      - low
      - medium
      - high
    description: 错误项迷惑强度

  sentence_roles:
    type: array
    required: false
    default:
      - thesis
      - explanation
      - conclusion
    description: 句群中的核心角色链

  head_constraints:
    type: object
    required: false
    description: 首句必须满足的角色和禁忌约束

  tail_constraints:
    type: object
    required: false
    description: 尾句必须满足的收束约束

  binding_pairs:
    type: array
    required: false
    default: []
    description: 句子之间不可交换的紧绑定对

  ordering_logic:
    type: string
    required: false
    default: thesis -> explanation -> conclusion
    description: 本题的结构推进链条

  uniqueness_source:
    type: array
    required: false
    default:
      - role_order_conflict
      - closure_position
      - binding_violation
    description: 正确顺序唯一性的结构来源

default_slots:
  sortable_unit_count: null
  sortable_unit_sentence_span:
    min: 1
    max: 2
  sortable_unit_type: sentence_block
  opening_anchor_type: explicit_topic
  opening_signal_strength: medium
  middle_structure_type: local_binding
  local_binding_strength: medium
  closing_anchor_type: conclusion
  closing_signal_strength: medium
  block_order_complexity: medium
  distractor_modes:
    - wrong_opening
    - local_binding_break
    - wrong_closing
  distractor_strength: medium
  sentence_roles:
    - thesis
    - explanation
    - conclusion
  head_constraints:
    must_not_have:
      - backward_reference
      - mid_transition
    preferred_roles:
      - thesis
      - definition
  tail_constraints:
    must_have:
      - closure
    preferred_roles:
      - conclusion
      - countermeasure
  binding_pairs: []
  ordering_logic: thesis -> explanation -> reasoning -> conclusion
  uniqueness_source:
    - role_order_conflict
    - closure_position
    - binding_violation

validator_contract:
  sentence_order:
    sortable_unit_count: null
    sortable_unit_sentence_span:
      min: 1
      max: 2
    require_legal_head: true
    require_legal_tail: true
    require_binding_pairs_intact: true
    require_complete_ordering_chain: true
    fail_when:
      - sortable_unit_count_mismatch
      - illegal_head
      - illegal_tail
      - binding_pairs_broken
      - ordering_chain_incomplete

fewshot_policy:
  enabled: true
  bind_to_difficulty: false
  max_examples: 1
  mode: structure_only

default_fewshot:
  title: 语句排序题结构示例
  content: >
    示例只用于提示“正式排序题按材料真实单元数制作，且要同时满足首句合法、中段可接、尾句可收”，
    不用于绑定具体难度。

patterns:
  - pattern_id: dual_anchor_lock
    pattern_name: 首尾双锚点锁序型
    enabled: true
    match_rules:
      opening_anchor_type:
        - explicit_topic
        - viewpoint_opening
      closing_anchor_type:
        - conclusion
        - summary
      opening_signal_strength:
        - high
        - medium
      closing_signal_strength:
        - high
        - medium

    control_logic:
      difficulty_source: 首句+尾句双锚点
      option_confusion: 中
      control_levers:
        passage: 首句应有较强起笔特征，尾句应有总结或结论信号
        correct_option: 先锁定首句，再利用尾句功能和局部捆绑推导完整顺序
        wrong_options:
          - 设置解释句或展开句误作首句
          - 设置结论句错位
          - 保留部分中段顺序正确但破坏首尾接口
      special_fields:
        reverse_inference_key: 先排除不能首句和不能尾句的句子，再处理中段局部链条

    generation_logic:
      generation_core: 首尾双锚点锁序型排序题制作
      processing_type: 首句判断+尾句判断+局部捆绑
      correct_logic: 正确顺序必须同时满足首句合法、尾句可收束、中段局部关系不断裂
      high_freq_traps:
        - 把解释句误当首句
        - 把展开句误当首句
        - 忽略结论句应在末尾
      distractor_pattern: 设置首句错误项、尾句错置项和局部顺序看似正确但整体接口错误的选项
      analysis_steps:
        step1_首句排除: 排除依赖前文、解释、转折后半句等不适合作首句的句子
        step2_尾句识别: 找出带总结、结论、行动号召色彩的尾句
        step3_局部捆绑: 建立紧邻关系或小链条
        step4_整体锁序: 用首尾双锚点锁定整体顺序

    difficulty_rules:
      complexity:
        base: 0.34
      ambiguity:
        by_slot:
          opening_signal_strength:
            high: 0.24
            medium: 0.38
            low: 0.54
          closing_signal_strength:
            high: 0.24
            medium: 0.36
            low: 0.50
      reasoning_depth:
        by_slot:
          middle_structure_type:
            local_binding: 0.34
            mixed_layers: 0.52
      distractor_similarity:
        by_slot:
          distractor_strength:
            low: 0.28
            medium: 0.46
            high: 0.64

    fewshot_example:
      title: 语句排序题示例-首尾双锚点锁序型
      fit_slots:
        opening_anchor_type: viewpoint_opening
        opening_signal_strength: high
        middle_structure_type: cause_effect_chain
        closing_anchor_type: conclusion
        closing_signal_strength: high
      input_brief: >
        句群先提出“人的身体是人力资本正常发挥的必要条件”这一总领判断，
        接着分别说明生育过程的生理变化、育后抚养带来的精力消耗，以及责任超载的结果，
        最后用“因此”得出回归职场后注意力不集中、工作懈怠的结论。
      question_brief: 对文章第四段进行排序最准确的是（ ）。
      options_brief:
        - 一组能保证总领句在前、结论句在后的顺序
        - 一组把解释句提前、打乱首尾接口的顺序
        - 一组把结论句放中间的顺序
        - 一组局部通顺但整体逻辑未闭合的顺序
      answer: 先总领、再解释生理与精力消耗、再指出责任超载、最后得出“因此”结论的顺序
      rationale_brief: >
        这类题关键是先锁定能作首句的总领判断，再识别带“因此”的结论句作尾句，
        中间再按因果链和局部承接关系补足；错项常表现为首句错、尾句错或局部链条断裂。

  - pattern_id: first_sentence_background_intro
    pattern_name: 首句背景引入判定型
    enabled: true
    match_rules:
      opening_anchor_type:
        - background_intro
      opening_signal_strength:
        - high
        - medium
      middle_structure_type:
        - local_binding
        - mixed_layers
      closing_signal_strength:
        - low
        - medium
      block_order_complexity:
        - medium
        - high

    control_logic:
      difficulty_source: first-sentence legality first, tail only as weak support
      option_confusion: medium_high
      control_levers:
        passage: 首句必须是能独立开启话题的背景引入或总起句，不能拿举例、细节、后果句硬做首句。
        correct_option: 先锁合法开头，再依靠局部捆绑和视角推进完成中段排序，尾句只做弱收束校验。
        wrong_options:
          - 把细节句、例证句、结果句提前成首句
          - 保留局部顺畅但破坏背景引入后的展开顺序
          - 误把带承接/转折/并列痕迹的句子提前
        special_fields:
          reverse_inference_key: 先排除不能独立起笔的句子，再找背景句后的总述/展开/落点链

    generation_logic:
      generation_core: 背景引入型首句排序题制作
      processing_type: 首句合法性优先 + 局部捆绑校验 + 弱尾句约束
      correct_logic: 正确顺序必须先给出合法背景引入，再进入桥接句或核心判断/纠偏句，随后按局部捆绑推进细节与解释，最后落到自然场景、范围扩展、行动要求或结果位置。
      high_freq_traps:
        - 把“例如/特别是/因此/所以/然而/同时”等依赖前文的句子错作首句
        - 把背景句后的总述和细节顺序颠倒
        - 把承担尺度过渡的桥接句误压到窄化说明之后
        - 把核心概念纠偏句误压到成本/技术/门槛说明之后
        - 为了追求首尾双锚点而误判尾句
      distractor_pattern: 错项优先伪装成局部顺畅但首句非法，或首句合法但中段捆绑拆错。
      analysis_steps:
        step1_first_sentence_gate: 先判断哪一句能独立作为背景引入或话题起笔
        step2_non_head_elimination: 排除依赖前文、举例、补充说明、结果承接的句子
        step3_mainline_clarification: 判断背景句后应先接桥接句、核心判断/纠偏句，还是更次一级的细化说明
        step4_local_binding: 核查哪些句子必须贴在一起，哪些只是范围扩展或自然落点
        step5_soft_tail_check: 最后再看哪一句更适合自然收束，不强求结论句收尾

    difficulty_rules:
      complexity:
        base: 0.46
      ambiguity:
        by_slot:
          opening_signal_strength:
            high: 0.28
            medium: 0.40
          closing_signal_strength:
            low: 0.42
            medium: 0.34
      reasoning_depth:
        by_slot:
          middle_structure_type:
            local_binding: 0.40
            mixed_layers: 0.58
      distractor_similarity:
        by_slot:
          distractor_strength:
            low: 0.30
            medium: 0.48
            high: 0.64

    fewshot_example:
      title: 排序题示例｜背景引入首句判定型
      fit_slots:
        opening_anchor_type: background_intro
        opening_signal_strength: high
        middle_structure_type: mixed_layers
        closing_signal_strength: low
      preferred_patterns:
        - first_sentence_background_intro
      input_brief: >
        句群中通常有一句能独立开出“大背景/大话题/传统语境/现实语境”，
        如“在……背景下”“如今”“长期以来”“近年来”“传统意义上”等；
        其余句子可能是总体判断、概念定义/解释、问题举例、对策展开、场景化描写或结果落点，
        其中至少有一两句虽然单看顺口，但并不具备合法首句资格。
      question_brief: 将以下句子重新排列，语序正确的一项是( )。
      options_brief:
        - 一组先放合法背景/总起句，再按“话题范围→定义/总述→例证/补充→结果或行动收束”的层次完成展开的顺序
        - 一组把细节、场景描写或局部动作句提前为首句的顺序
        - 一组首句看似可读但实际上已经落入概念定义、局部场景或局部判断的顺序
        - 一组把依赖句、同主体补充句、总结句或配对句拆开后造成链条失真的顺序
      answer: 先锁合法起句，再保持话题总起先于定义/总述、依赖句贴锚点、同主体补充链不断裂、配对句不拆开，最后落到自然收束位置的顺序
      rationale_brief: >
        这类题先排非法首句，再锁合法首句。背景引入句、话题总起句通常比细节句、场景句、例证句、
        结果句更适合作首句；当一组句子同时出现“传统意义上/在……背景下/如今”这类范围句和概念定义句时，
        通常应先放范围句，再放定义句。像“特别是”“例如”“因此”“同时”以及“行至……”“映入眼帘……”
        这类已经进入局部场景或依赖前文的句子，通常不能硬作首句。锁定首句后，再依据局部捆绑、
        共同信息延续和功能层次推进完成中段排序；若一条句子承担的是从“大背景/大范围”过渡到“具体场域/具体对象”的桥接功能，
        不要机械把它压到更窄的设施总述或场景细节之后；若出现“X不等于Y / 不是…… / 目标是……”这类概念纠偏句，
        往往应先于成本、技术、门槛等次级说明出现。若出现“同时/但同时”这类同主体补充句，应尽量贴住
        与其共享对象或动作的前句，不要被更宏观的战果句、总结句或结果句隔开；若出现“问题概述+例如举例+所以/因此对策”
        这类链条，应先收完问题与例证，再进入对策。若“但同时……也……”补的是价格、成本、负担、门槛等现实补充，
        通常应贴在前面的价值/定义句之后，而不是拖到后面的“因此”结论句或“不但……还……”条件链之后。若同时存在“现在就做”的行动紧迫句和“关乎每个人/每个地区”的范围扩大句，
        不必机械规定谁一定压轴，应看哪一句更像主链闭合、哪一句更像末端放宽。尾句只做弱收束核验，
        可能是场景落点、结果总结、行动要求或范围扩展，不能机械套用“结论句一定收尾”。

  - pattern_id: carry_parallel_expand
    pattern_name: 承接并列展开型
    enabled: true
    match_rules:
      opening_anchor_type:
        - upper_context_link
      middle_structure_type:
        - parallel_expansion
      closing_anchor_type:
        - summary
      block_order_complexity:
        - medium
        - high

    control_logic:
      difficulty_source: 首句承接+并列展开接口
      option_confusion: 高
      control_levers:
        passage: 首句需承接上文，中段存在并列与补充关系，尾句有总结提升
        correct_option: 先识别承接句，再按并列/补充接口排列中段，最后落到总结句
        wrong_options:
          - 让并列项局部顺序错位
          - 让中段局部看似成立但断开承接链
          - 让总结句提前
      special_fields:

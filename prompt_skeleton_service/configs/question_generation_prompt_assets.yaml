question_generation:
  section_labels:
    selected_material: "[Selected Material]"
    original_material_evidence: "[Original Material Evidence]"
    material_meta: "[Material Meta]"
    material_readability_contract: "[Material Readability Contract]"
    material_prompt_extras: "[Material Prompt Extras]"
    center_understanding_consumption_contract: "[Center Understanding Consumption Contract]"
    sentence_order_consumption_contract: "[Sentence Order Consumption Contract]"
    reference_question_template: "[Reference Question Template]"
    reference_question_analysis: "[Reference Question Analysis]"
    hard_constraints: "[Hard Constraints]"
    answer_grounding_contract: "[Answer Grounding Contract]"
    material_answer_anchor: "[Material Answer Anchor]"
    repair_requirements: "[Repair Requirements]"
    round1_fewshot_asset: "[Round 1 Few-shot Asset]"

  material_readability_contract:
    - "The final displayed material must read like a natural, formal Chinese passage excerpt that a human can read directly."
    - "Do not output bizarre symbols, duplicated fragments, machine-stitched paragraphs, broken quotations, or half-finished enumerations."
    - "Prefer preserving the original sentence order and wording. Only make the smallest necessary repairs for readability and coherence."
    - "If the selected material cannot be safely polished without changing its evidence basis, keep the material conservative rather than aggressively rewriting it."

  reference_guidance:
    - "Treat the reference question as a structure-only few-shot template. Align with its stem style, option granularity, reasoning path, and written tone, but do not copy wording."
    - "Do not copy or paraphrase the reference question's topical content, examples, terminology, or explanation text into the new analysis."
    - "If the reference question contains an explanation, reuse only its explanation structure and elimination order, not its content wording or topic-specific claims."
    - "Prioritize discourse structure and reasoning shape over topical overlap. Topic may change, but the question-making logic should stay parallel."
    - "Avoid narrow lexical imitation of one reference sample. Prefer higher-dimensional alignment: discourse role, abstraction level, distractor competition, and elimination pathway."

  material_answer_anchor:
    explanation: "For this item, the correct answer must stay semantically equivalent to the removed source span above. Do not invent a new answer basis, a broader policy task, or a stronger conclusion than the local context supports."

  final_generation_instruction: "Use the provided material as the source passage and generate exactly one question. Before finalizing, run one global coherence check over material, stem, options, answer, and analysis; if any part drifts from the same central meaning chain, regenerate instead of patching only one local field."

  round1_fewshot_assets:
    enabled: true
    packs:
      sentence_fill:
        question_type: sentence_fill
        csv_path: "../../reports/round1_fewshot_sentence_fill_candidates_2026-04-12.csv"
      center_understanding:
        question_type: main_idea
        business_subtype: center_understanding
        csv_path: "../../reports/round1_fewshot_center_understanding_candidates_2026-04-12.csv"
      sentence_order:
        question_type: sentence_order
        csv_path: "../../reports/round1_fewshot_sentence_order_candidates_2026-04-12.csv"

  fewshot_prompt_guards:
    sentence_fill:
      - "If Round 1 clean few-shot coverage does not include opening or inserted blanks, do not force middle-position logic onto them."
      - "When coverage is missing, stay structurally conservative instead of guessing a middle-like logic relation."
      - "Keep logic_relation strict: distinguish bridge-continuation, bridge-transition, carry_previous-explanation, and lead_next-transition."
      - "Prefer keeping a full paragraph-level passage with one natural blank over compressing the material into a short summary window."
      - "Keep the correct option compact and slot-shaped: prefer one short sentence or one compact clause, not a long policy list or macro slogan."
      - "Keep all four options in the same length and syntax band; avoid one option that is disproportionately long, highly quoted, or paragraph-like."
      - "Preserve the local register and slot texture. If the blank naturally sits in quotes, brackets, an idiom-like phrase, a proverb-like saying, a poetic line, or a compact fixed-expression band, keep the correct option and distractors in that same band instead of rewriting them into modern explanatory prose."
      - "Do not turn a source-like local fill into a stronger explanation sentence just because it sounds more logical. For sentence_fill, local exam texture and slot fit outrank abstract completeness."
      - "Prefer local lexical recovery over upgraded paraphrase. Reuse the source-side wording, imagery, discourse marker, and semantic scale when the material already provides a natural fill path; do not replace it with a more inferential, more technical, or more editorial sentence."
      - "If the source blank is naturally a fixed expression or quoted line, prefer the complete source-like expression rather than only half of it or a paraphrased variant."
      - "Stay in the same local lexical field and object domain as the nearest context. If the passage is cueing 云、竞争、干预、替补、引号内名句等 local anchors, prefer recovering that same anchor band instead of swapping to a nearby cause, downstream consequence, or new technical term."
      - "For middle explanatory blanks, prefer one nearest-neighbor bridge clause that names the page-level core concept already present nearby, rather than a second-order paraphrase such as 压力更大、风险更高、意义更深、影响更广."
      - "If the local context has already named the exact abstract target such as 性选择、干预、经典阅读、公众舆论, bridge back to that named concept directly instead of rewriting it into one more downstream mechanism or derivative effect."
      - "For descriptive or scenic blanks, stay with visible scene objects and local motion cues already on the page (for example 云、光、风、尘、色调), and avoid replacing them with inferred causes such as 下雨、气压、环境条件 unless the source itself says so."
      - "For bridge / carry_previous+lead_next blanks, do not stop at a vague smooth sentence. The bridge should carry at least one visible left anchor and one visible right anchor, so that it clearly hands the reader from the previous claim into the next exact concept."
      - "If the next sentence is about a concrete right-side concept such as 储水能力、人口结构、效果方式、需求变化、根本目的, let the bridge pre-name or pre-orient that concept instead of floating at the level of generic importance or generic change."
      - "When the bridge is followed by explicit example markers or expansion frames such as 如、例如、一方面/另一方面、首先/其次、四项列举、冒号解释, prefer the first concrete pivot that opens those examples, not a meta-summary about how the examples are organized."
      - "If the right side is about a specific agent, object, or value carrier such as 人民、教育教学变化、节目中的上古神兽、阅读准备环节, let the bridge point to that concrete carrier early instead of staying at the level of generic innovation, generic importance, or generic significance."
      - "If the left context sets up an explicit scalar or comparative relation such as 越…越…、越低/越高、越大/越小, keep the bridge on that same scale; do not flatten it into a generic importance judgement or a broader policy comment."
      - "If the right context begins with a concessive or frequency frame such as 更多时候还是、往往还是、通常仍是, the bridge should usually supply the limited opposite pole or rare-case lead-in, such as 偶尔、也有时、在某些情况下, rather than a strong immediate-effect conclusion."
      - "If the next sentence is itself the first concrete example, image, or carrier reveal, the bridge should stay equally concrete and hand into that example directly, rather than summarizing it as a generic expression mode, innovation path, or presentation form."
      - "If the right-side landing is a subject-of-value or beneficiary question such as 为了谁、谁是主体、谁在创造, the bridge should name or pre-orient that subject directly instead of translating the passage into a moral exhortation, action slogan, or generic spirit statement."
      - "For opening summary blanks, the correct option should behave like a natural lead sentence that forecasts the paragraph's actual landing, not a meta-commentary about how to understand, evaluate, or handle the topic."
      - "If the paragraph that follows is mainly evidence, examples, or elaboration, let the opening summary state the shared conclusion those examples are proving; do not replace it with a policy task, service report, or a broader commentary frame."
      - "If the source register is poetic, quoted, literary, or headline-like, preserve that register at the opening blank. Do not flatten a poetic or rhetorical lead into a generic policy or analytical sentence."
      - "If the following paragraph unfolds by listing nature, motive, purpose, mechanism, or reasons, the opening summary should give the central judgement that those dimensions are explaining, not a meta-roadmap that merely previews those dimensions."
      - "If the following paragraph is already an example list or manifestation list, the opening summary should usually be one step more compact and more conclusive than the list itself, not another enumerative paraphrase."
      - "For opening topic-intro blanks, if the source clearly supports a maxim-like, quote-like, headline-like, or parallel opener, preserve that compact ceremonial register instead of rewriting it into a modern explanatory opinion sentence."
      - "If the paragraph after the blank already contains the main judgement in plain prose, the opening topic-intro should often serve as thematic lift or tone-setting lead, not a second restatement of that judgement in bureaucratic language."
      - "When an opening topic-intro blank can naturally be filled by a short maxim-like, proverb-like, quote-like, or parallel phrase, prefer that short high-register opener over a longer explanatory sentence."
      - "For opening topic-intro blanks, avoid turning the answer into a modern editorial statement about what society should think, what media should do, or what values should matter, when the source can instead open with a compact thematic line."
      - "If the opening topic-intro is followed by solemn public-exam prose about heroes, responsibility, education, reform, or historical mission, the opener should often read like a concise thematic lift or quoted lead, not like the body paragraph's first summary sentence."
      - "In head_topic_intro items, many real answers are very short and act like a题眼、警句、引语、对偶句、格言或标题化起句. If such a compact opener is source-defensible, prefer it over a longer full-sentence explanation."
      - "When the gold-style opening can be carried by a compact phrase such as 功以才成，业由才广 / 一花独放不是春，百花齐放春满园 / 明者因时而变，知者随事而制, do not paraphrase it into policy prose or a commentary sentence about what people should do."
      - "For solemn head_topic_intro blanks, prefer compact classical-register lines, aphorisms, or quote-like leads that feel like an exam setter's ready-made opener; do not fabricate a new modern slogan when a shorter classical or quasi-classical lift would sound more real."
      - "When a head_topic_intro blank can plausibly be solved by a ready-made-looking classical or quasi-classical line, avoid modal or editorial verbs such as 应当、必须、要、决定、推动 in the correct option. Prefer a shorter题眼 with stronger cadence."
      - "For head_topic_intro, if the downstream paragraph already names concrete body nouns such as 媒体、教材、国际问题、烈士纪念日、教师能力, the opener should often avoid repeating those body nouns directly and instead use a more quotable, allusive, reusable thematic line."
      - "A strong head_topic_intro answer should often sound like a line that could stand alone as a title lead or citation, not like a bespoke summary sentence written only for this one paragraph."
      - "For opening subclause blanks, the correct option must stay clause-sized and original-position-compatible; do not widen a clause slot into a fuller standalone summary sentence."
      - "If a clause blank is followed by concrete evidence or examples, the clause should state the specific claim those examples are proving, not a broader wellness/general-importance takeaway."
      - "For ending-subclause blanks, inspect the exact syntactic slot. If the frame before the blank expects a noun phrase, quoted phrase, or short predicate complement, keep that same slot type; do not turn it into a full explanatory sentence."
      - "When an ending-subclause blank is followed by phrases like 如何认定、如何核查、如何治疗 or by a metaphor/comparison tail, the blank should usually provide the concrete issue or image being carried forward, not a meta-level judgement about importance or reform."
      - "If the tail clause is immediately followed by a serial question list such as 如何认定、如何核查、如何治疗, the blank should usually be a concrete noun phrase naming the problem object itself, not another question or a reform conclusion."
      - "Use the canonical stem style: 填入画横线部分最恰当的一句是( )。"
      - "For ending blanks, do not expand into a new policy task unless function_type explicitly requires countermeasure."
      - "For ending-summary blanks, prefer a compact source-defensible landing judgement that closes the paragraph's actual object and force; do not reopen the topic as a fresh mission, preparedness task, or broader reflection."
      - "If the sentence before the ending blank already fixes the predicate frame, such as 试图、意味着、说明、能确定的只有一点、共同之处是, the correct option should complete that exact frame with the right object-level landing instead of shifting to a different action or discourse task."
      - "For ending-subclause blanks, stay clause-sized and final-position-compatible. Do not widen the missing tail clause into a fuller new sentence or a broader moral/policy takeaway."
      - "If the ending blank follows accumulated evidence or examples, the correct option should usually state the one judgement those materials prove, not a more generic significance statement and not an urgency warning unless the source itself turns that way."
      - "For ending-countermeasure blanks, the correct option should be a practical and source-licensed remedy or governance move that answers the problem just laid out; do not replace the remedy with a consequence restatement, a warning, or an adjacent problem diagnosis."
      - "For ending-subclause blanks, keep the local lexical family and object domain visible. If the source is ending on 都邑遗址、人生阅历、职业危害、瘙痒作用, do not jump to a new higher-order label when a nearer source phrase can close the sentence more naturally."
      - "For ending-countermeasure blanks, match the scale of the passage subject. If the passage is about individual stance, reading of fate, or personal handling, prefer a concise orientation or principle; if it is about institutions or governance, then use institutional remedy language. Do not automatically upgrade every remedy into policy-management wording."
      - "If an ending-countermeasure blank is introduced by a problem chain and ends with 所以我们需要、为了优化……、因此……, the best answer may still be a compact imperative or principle rather than a full governance program; keep the answer on the same action scale as the source."
      - "In tail_countermeasure items, real answers vary across three source-licensed bands: a compact imperative/principle (e.g. 教师必须戒“独”), an urgency/necessity judgement (e.g. 破解……势在必行), or a concrete治理/制度方向. Choose among these bands based on the source, and do not default everything to governance jargon."
      - "If the source already offers an analogy, ownership principle, or moral orientation before the blank, the countermeasure may simply state the corresponding principle on the same scale, instead of rephrasing it as 'this has become an issue that must be addressed'."
      - "If the passage before an ending-countermeasure blank is already comparing the issue to an offline ownership, inheritance, disposal, or personal-rights arrangement, the best answer is often the corresponding autonomy/rights principle itself, not a meta statement that the issue now deserves attention."
      - "If the sentence before a tail_countermeasure blank has already finished stating harms or consequences, the correct option should usually stop the harm chain and turn to remedy/necessity/principle. Do not continue the consequence list in the blank."
      - "Especially when the source uses a frame like 如果不加以遏止，将……，blank, the blank should almost never add another 还会/更会/甚至会 consequence. It should pivot to necessity, remedy, or imperative response."
      - "When a tail_countermeasure item is about digital assets, inheritance, disposal, or personal ownership, prefer a same-scale disposal/rights principle over a broad statement that the issue has become a social challenge."
      - "If the passage explicitly compares digital property to offline遗产安排 or personal disposal, the correct answer should usually contain the disposal authority itself (such as 由个人自行处置 / 由本人预先安排), not merely ask how to deal with the issue."
      - "When the source is already talking about生态、治理、空间净化、行业秩序, a good tail_countermeasure answer may stay in concise治理名词短语 band such as 生态治理、秩序治理、环境净化 rather than expanding into a longer moral commentary."
      - "Distractors should share topic, syntax band, and local slot position, but each should fail on one decisive dimension instead of drifting to an unrelated topic."
      - "Do not optimize to one sample's wording pattern. Keep slot-level consistency across subject/object, discourse role, and local logic direction."
    center_understanding:
      - "For fen-zong-fen or middle-focus passages, do not force the answer into a high-frequency main_axis_source or argument_structure pair."
      - "When the passage focus sits on a middle-position claim, stay cautious and avoid over-compressing it into a familiar central-meaning template."
      - "Do not assemble a seemingly complete answer by stitching two partial points. Prefer one unified central judgement that can consistently explain stem, options, and analysis."
      - "Keep options concise and parallel in granularity; do not let one option become a long explanatory sentence while others stay short."
      - "Prefer stronger exam stems such as: 对这段文字概括最准确的是( )。 最符合这段文字主旨的是( )。 这段文字意在强调( )。"
      - "Avoid weaker center-understanding stems such as: 这段文字主要介绍了什么。 这篇文章讲了什么。 这段文字旨在说明( )。 when a more standard central-meaning stem can be used."
      - "If the material is clearly a fable, parable, short story dialogue, keyword/theme passage, or classical-prose-like center_understanding item, do not mechanically force the generic stem 对这段文字概括最准确的是( )。 Prefer the corresponding stable public-exam stem when it sounds more natural, such as: 这个故事说明的道理与下列哪项最为接近( )。 下列说法中与该寓言寓意一致的是( )。 对这个故事的寓意理解不正确的是( )。 这段文字的关键词是( )。"
      - "If the material itself naturally points to a task such as 寓意、道理、关键词、主题词, keep that task visible in the stem and in the correct option instead of rewriting everything into a generic central-summary shell."
      - "For keyword/theme passages, prefer a stable keyword-like stem such as: 这段文字的关键词是( )。 最适合做这段文字关键词的是( )。 这段文字主要围绕哪个关键词展开( )。 Do not fall back to the generic 对这段文字概括最准确的是( )。 unless the material truly reads like a normal central-summary item rather than a keyword/theme item."
      - "For keyword/theme passages, keep options compact and term-like when the source supports it. Prefer one theme word, word pair, or short noun phrase over four long full-sentence summaries."
      - "For keyword/theme passages, the hard distractors should stay in the same lexical band as the correct option: same topic field, same compactness, and same exam texture. Do not mix one compact keyword option with three sentence-style summaries."
      - "For fable or story-like center_understanding items, when the source naturally lands on a proverb-like judgement, practical lesson, or direct moral recognition, prefer that direct exam landing point over a thesis-style abstract summary sentence."
      - "For fable or story-like items using stems such as 道理最接近 / 寓意一致 / 选非, keep all four options short, parallel, and exam-like. Prefer maxim-like, idiom-like, or direct lesson wording when the material supports it, rather than four long explanatory summary sentences."
      - "When a fable passage is really pointing to 各有短长、直面困难、自我反思、经验积累、不可只换环境这类 direct moral landing points, let the option land there directly. Do not wrap it again into a broader theory-of-value or evaluation-framework sentence."
      - "If the fable's final force lies in what the story teaches, reveals, or warns against, the correct option should usually sound like a candidate answer a human exam setter would really write, not like a commentator paraphrasing the whole story back to the reader."
      - "For keyword/theme items, the correct option may be a compact theme word or word pair rather than a full sentence, as long as it still serves the center_understanding task and remains uniquely defensible from the material."
      - "For classical prose or essay-like center_understanding materials, keep the wording natural and exam-like. Do not import modern report, policy, or evaluation-framework shells just because the task is center_understanding."
      - "Each option value must be plain option text only. Do not wrap options as objects, JSON fragments, Python dict strings, or label-text pairs such as {'label':'A','text':'...'}."
      - "For medium or hard center_understanding items, do not let the correct option stay too close to one obvious tail sentence. Raise it by half a layer to one layer while keeping it fully source-defensible, and keep at least one same-topic competitor alive."
      - "But if the passage already lands on a clean public-exam conclusion and extra abstraction would change the passage task, weaken the main axis, or turn the answer into a more polished but less faithful summary, keep the direct landing point instead of forcing one more layer."
      - "For turning + sub_total passages, preserve the post-transition core judgement instead of collapsing it into a generic one-dimensional summary."
      - "For turning passages, first identify the passage task before writing the correct option: is it defining the core mechanism, correcting a misunderstanding, setting an acceptance boundary, or stating a final recognition condition. Let the option carry that task directly instead of flattening everything into a generic 'importance / standard / value' summary."
      - "If the source axis contains a dual constraint or a judgement such as uncertainty, limited credibility, or doubtful restoration quality, keep both the support condition and the final judgement. Do not weaken it into only 'hard to do', 'more difficult', or 'less easy'."
      - "For medium or hard turning passages, keep at least one strong distractor that shares the same center object and one support dimension, but misses the final judgement or loses one key constraint."
      - "Keep the center object boundary explicit. Do not widen a passage-specific object such as '久远历史的还原' into a generic formula like '历史还原' when the source passage is clearly narrower."
      - "In the analysis, explicitly restate the decisive wording carried by the correct option instead of only paraphrasing its logic at a distance."
      - "Do not force a concrete passage conclusion into a meta task label, evaluation framework, policy path, or abstract standard sentence when the source passage itself is not organized that way."
      - "For center_understanding, 'object + task' is a verification check, not a fixed answer template. If the passage's force lies in a concrete central judgement, prefer that judgement over a more academic or policy-like reformulation."
      - "Prefer public-exam option texture over thesis-like or criterion-style wording. Avoid expressions such as 本质上、根本功能在于、关键在于、应以……判断 unless the source passage itself clearly uses that framing."
      - "Do not upgrade a passage conclusion into a definition, principle, or evaluation-criteria sentence if a more direct central judgement would sound more like a real exam option."
      - "When the passage is correcting an overly simple reading, the correct option should usually preserve the correction itself, such as 不能简单地、并非仅仅、不能机械地、不能据此直接…… rather than converting the answer into a neat abstract doctrine."
      - "If a turning passage rejects an exclusionary or over-strict judgement and then explains the remaining value, utility, or acceptance room of that excluded object, keep both halves in the correct option. Prefer a public-exam phrasing like '不能……仍……/也……' over a one-sided negative summary."
      - "When the passage's final landing point is an approval boundary, recognition condition, or acceptance threshold, keep that boundary concrete in the correct option. Do not rewrite it into vague shells such as 成败标准、综合判断、相应标准、一般原则 unless the source passage itself is that abstract."
      - "When the passage explains one mechanism as the root and treats other phenomena as symptoms, prefer a compact root-level judgement that names that mechanism directly. Do not add empty wrappers like 一系列表现、整体意义、根本价值 if they are not doing real work."
      - "For parallel passages, first decide whether the shared task is: summarizing several same-level advantages, stating a common denominator, preserving a two-sided judgement, or naming a direct contrast. Keep that task explicit instead of collapsing the answer into a broad meta line such as 重要力量、综合作用、整体价值 unless the passage itself is written that way."
      - "When several parallel clauses or examples point to one simple public-exam landing point, prefer the direct landing point itself, such as 区别、优点、作用、历史悠久、保护与利用, over a more academic or policy-style reformulation."
      - "For parallel passages built from two or more same-level facets, preserve the co-equal relation in the correct option. Do not silently turn one facet into the main axis and the others into support material."
      - "If a parallel passage is introducing two objects side by side, the correct option should usually keep the comparison object explicit, rather than expanding to a wider category or a more abstract evaluative sentence."
      - "Hard distractors should not fail by being obviously overclaimed. Avoid making the nearest competitor too easy to eliminate through extreme words, inflated causality, or textbook-style slogans."
      - "When background, data, examples, or prelude are only paving the way for one later judgement, let the correct option answer that later judgement directly. Do not beautify it into a broader summary if that loses the passage's actual landing point."
      - "If examples or data are only serving as evidence, the correct option should usually state the conclusion they prove, not a smoother commentary on the examples and not a higher-order description of what the passage seems to be doing."
      - "When a direct source-defensible judgement already sounds like a real public-exam answer, prefer that plain landing over a more polished but less faithful reformulation."
    sentence_order:
      - "Prefer clean anchor combinations already covered by Round 1 few-shot assets."
      - "If coverage is missing for an anchor combination, do not guess a new clean combination."
      - "Do not compensate for weak ordering clues by pasting explicit tutorial connectors such as 棣栧厛銆佸叾娆°€佹帴鐫€銆佹渶鍚?onto the material."
      - "When two readings compete, prefer the one supported by tighter source-internal bindings and a more natural published-prose chain."
      - "Uniqueness must be defended by at least two dimensions among head-tail legality, local binding pairs, and role-chain progression; do not rely on a single weak clue."
      - "For first-sentence judgement, prefer a legal topic-setter or background-intro opener over scene detail, local example, or narrowed particularization."
      - "Sentences starting with cues such as 特别是、例如、所以、因此、同时、但同时、然而、另外、还、并且 usually are not legal first sentences unless the sentence clearly resets the topic on its own."
      - "In background-intro items, openers such as 如今、近年来、长期以来、在……背景下、传统意义上 often have stronger first-sentence legality than descriptive detail or consequence clauses."
      - "A legal first sentence in this leaf does not have to carry an explicit background marker; a broad topic-setting sentence, a total judgement that can open the whole discussion, or a problem-framing sentence may also be the correct opener if it governs the remaining sentences better than local detail."
      - "When one sentence introduces the topic scope, traditional context, or discussion frame, and another sentence immediately starts defining, classifying, or specifying that topic, prefer the scope-setting sentence first and treat the definition/specification sentence as the next layer rather than the opener."
      - "If one sentence is a broad topic/background setter and another only reports what someone saw, reached, encountered, or did at a local scene, prefer the broader topic/background setter as the legal first sentence."
      - "Scene-arrival or immediate-perception clauses such as 行至……、走进……、来到……、映入眼帘……、仿若……、可见…… usually are not legal first sentences when the set still contains a wider topic-introducing or background-opening sentence."
      - "Do not choose a sentence as first merely because it reads smoothly in isolation. A legal first sentence must be able to open the discourse scope, not just describe one local picture, one narrowed detail, or one already-entered scene."
      - "For background-intro leaves, first eliminate candidate openers that are detail-first, example-first, result-first, contrast-first, or already inside the scene; only then compare the remaining broad openers."
      - "When one candidate can cover the whole passage as a general thesis, judgement, or problem frame, and the competing candidate only enters a subscene, subexample, or local process, prefer the broader governing opener."
      - "If a sentence begins with 特别是、例如、因此、所以、同时、但同时 or another dependency cue, keep it close to the governing sentence it depends on; do not separate the cue sentence from its anchor with an unrelated block."
      - "For turn-binding leaves, do not let a 但 / 然而 / 但是 sentence seize first position just because it sounds forceful. Its main job is usually to reverse or correct the immediately preceding expectation, old view, or prior situation."
      - "When a turn sentence is followed by a landing such as 在该背景下、可见、由此、因此 or another discourse-level closure, first complete the pre-turn sentence, then place the turn, and only then let the landing close the chain."
      - "If a sentence begins with 但同时 / 同时 and its content is contrastive supplement, additional function, or parallel extension of the immediately preceding actor/topic, keep it attached to the nearest same-topic sentence rather than floating it to a much earlier macro sentence."
      - "If a 但同时 sentence introduces a cost, threshold, burden, or side-effect, it usually follows the nearest value/benefit/feature sentence it is balancing, not the later 因此 / 所以 requirement block that is inferred from that balance."
      - "If a 但同时 / 同时 sentence reports a side-effect, price/status rise, or other现实补充 of the just-defined object, keep it immediately after that object's value/definition sentence. Do not drag it behind a later 因此 sentence or a downstream 不但……还…… requirement pair."
      - "Sentences beginning with 同时、再者、另外、尤其、比如 or other obvious continuation cues are rarely legal first sentences. Keep them close to the same-level support block they extend, rather than promoting them into the opener slot."
      - "If a sentence begins with 因此 or 所以 and is clearly giving an overall remedy, judgement, or conclusion, place it after the problem/evidence block it summarizes and before any lower-level implementation details that merely unpack it."
      - "If a 因此 / 所以 sentence also carries a paired structure such as 不但……还……, treat that pair as a downstream requirement or consequence block: first complete the topic-definition / value / evidence chain, then place the paired result or requirement block, and keep the pair itself intact."
      - "Keep paired structures tight and ordered: patterns such as 不但……还……, 不仅……也……, 一方面……另一方面…… should not be split apart by unrelated sentences."
      - "If one sentence states a current shortcoming, bottleneck, or problem frame and another sentence begins with 例如 to illustrate that shortcoming, keep the problem frame before the example, and place any 因此 / 所以 remedy only after the problem-example block has closed."
      - "When a broad background or city-wide/topic-wide sentence is followed by a vivid bridge sentence showing the same symbol, feature, or phenomenon extending from its source into wider public space, that bridge may come before a narrower scenic-zone or facility overview. Do not mechanically force the enumerative overview ahead of the bridge if the bridge is what carries the discourse from macro prevalence to concrete site."
      - "When one sentence explicitly corrects what the core concept is or is not, or states the real target with patterns like 不等于 / 不是 / 目标是, treat it as a mainline conceptual clarification. It often belongs before secondary cost, threshold, or technical-feasibility explanation, not after them."
      - "If one sentence is an action-urgency judgement such as 并不是未来要做而是现在做起 and another is a universality / everyone-involved expansion such as 关乎每个人、每个地区, do not force the urgency sentence to be final. The urgency call may close the main reasoning first, and the universality sentence may serve as the widened landing."
      - "When one sentence states a broad strategic effect, overall role, or stage-level status such as 成为中坚力量 / 发挥关键作用 / 形成总体格局, and another sentence gives the same actor's concrete practice or operational manifestation, prefer concrete practice first if it supplies the tighter anchor for a following 同时 / 进一步 / 还 等补充句."
      - "Phase-end, result-report, or terminal-status sentences such as 至……结束、最终、逐步成为、已经发展到…… usually are not legal first sentences when the set still contains a broader thesis sentence, topic setter, or institution-building opener."
      - "After the passage has entered a concrete example, local scene, or subordinate explanation, do not jump back to a missing broader overview unless the text contains a clear reset cue."
      - "For this leaf, do not mechanically force the last sentence to be a scenic landing. The natural tail may instead be an action call, a scope expansion, a result summary, or another discourse-level closure, as long as it fits the whole chain."
      - "Do not use an example sentence, a narrowed detail sentence, or a consequence-bearing sentence as the tail when the passage still lacks a natural closure or overall landing."
      - "Use a canonical stem that matches the actual sortable unit count, such as: 将以下5个句子重新排列，语序正确的一项是： or 将以下6个句子重新排列，语序正确的一项是："
      - "All options must be plain digit permutations whose length matches the sortable unit count; never output explanation text in options."
      - "The final analysis must end with a single clear conclusion sentence of the form: 故正确答案为X。"


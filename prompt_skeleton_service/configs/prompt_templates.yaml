  - template_id: tpl-main-idea-judge-v3
    template_name: main_idea_judge_review_default
    template_version: v3
    question_type: main_idea
    action_type: judge_review
    content: |
      你是一名公考主旨概括题审核专家。请按正式考试标准审核当前题目。
      重点核查：
      1. 题干是否像正式考试题，而不是教学提示。
      2. 是否只有一个最优答案，且正确项确实统摄全文主旨。
      3. 干扰项是否来自不同偏差方向，而不是统一做成局部截取。
      4. 解析是否先抓主旨，再解释正确项和错误项。
      5. 材料是否本身自然可读，像正式公开文稿摘录，而不是机器拼接、重复堆砌或半截表达。
      6. 题目与材料、难度目标是否匹配。
      审核上下文：
      - question_type: {question_type}
      - generated_question_json: {generated_question}
      - validation_result_json: {validation_result}
      - difficulty_fit_json: {difficulty_fit}
      - material_preview: {material_preview}
    is_active: true
    created_at: "2026-03-30T00:00:00+08:00"


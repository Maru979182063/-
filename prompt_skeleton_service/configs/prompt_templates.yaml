    content: |
      你是一名公考语句填空题命题专家。请依据新的控制项重做一道语句填空题，确保上下文约束清晰，且只有一个最优答案。
      重做时必须做到：
      1. 正确项保持局部可回填，不写成长篇部署句、口号句或额外引申句。
      2. 错误项与正确项保持同题域、同句法位置、同长度带，做到“似可填入但关键不合”。
      3. 如果空位是 ending，总体方向优先收束；如果空位是 bridge / carry_previous / lead_next，优先保证双向衔接而不是宏观正确。
      4. 解析不要泛泛复述材料，要明确指出空位功能和错项失配点。
      5. 如果需要略高于同档真题的训练强度，优先提升错项相似度和近误竞争，不要让正确项变得不像真题。

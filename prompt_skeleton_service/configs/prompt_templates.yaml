templates:
  - template_id: tpl-main-idea-generate-v3
    template_name: main_idea_generate_default
    template_version: v3
    question_type: main_idea
    action_type: generate
    content: |
      你是一名公考言语理解命题专家，正在制作正式考试风格的主旨概括类单选题。
      基本要求：
      1. 最终必须是四选一单选题，且只有一个最优答案。
      2. 题干必须像正式考试题，不要写成教学提示、AI说明、材料摘要或口语化提问。
      3. 优先使用这类稳定问法：这段文字意在说明（ ）。这段文字旨在强调（ ）。这段文字主要说明（ ）。对这段文字概括最准确的是（ ）。
      4. 禁止使用这类弱考试化问法：这段文字主要介绍了什么？以下文字主要想说明的是？这篇文章讲了什么？
      5. 正确项必须统摄材料主旨，不能只是摘取局部事实、例子、背景或延伸意义；要体现“中心对象 + 文章任务/核心判断”。
      6. 干扰项必须与材料同话题、同层级、可比较，但偏差方向要分散，至少覆盖以下几类中的三类：局部信息冒充主旨、范围过宽、范围过窄、功能误判、立意偏移、吸睛但偏核。
      7. 四个选项长度、抽象层级和措辞风格尽量接近，避免一眼排除；不要把正确项做成明显更稳、更长或更像标准答案的句子。
      8. 当难度目标为 medium 或 hard 时，题目不能做到“一眼直选”。正确项应比材料表层结论再抽象半层到一层；至少设置一个高相关强干扰项，与正确项共享中心对象但错在文章任务、论证重心或统摄范围。
      9. 解析必须先指出解题抓手，再说明正确项为何成立，并简要排除其余选项；要直接说明正确项如何统摄全文，而不是只罗列材料信息。
      10. 材料呈现必须像正式公开文稿中的自然摘录，不能出现重复句、奇怪符号、拼接痕迹、半截句或机器改写腔。
      11. 只输出结构化 JSON，不要添加额外说明。
    is_active: true
    created_at: "2026-03-30T00:00:00+08:00"

  - template_id: tpl-main-idea-title-selection-generate-v3
    template_name: main_idea_title_selection_generate
    template_version: v3
    question_type: main_idea
    business_subtype: title_selection
    action_type: generate
    content: |
      你是一名公考标题填入题命题专家，正在制作正式考试风格的“选择标题”单选题。
      强约束：
      1. 正确项必须像标题，而不是汇报句、总结句、政策部署句或要点拼接句。
      2. 正确项应尽量凝练，能够统摄全文中心对象与核心判断，不能把多个并列要点机械串联起来。
      3. 不要把“祝贺、肯定、审议、部署、总结成果”等会议流程性表达直接写成标题。
      4. 错误项不能全是“局部信息截取”，至少要包含范围失衡、立意偏移、标题偏宽或偏窄、吸睛但偏核等不同层次的干扰。
      5. 四个选项都要像标题，长度和风格尽量接近，不能出现一个明显长句和三个短标题。
      6. 解析必须说明全文主旨、标题应统摄的中心，以及各错误项偏离在哪里。
      7. 只输出结构化 JSON，不要输出任何额外说明。
    is_active: true
    created_at: "2026-03-30T00:00:00+08:00"

  - template_id: tpl-main-idea-center-understanding-generate-v3
    template_name: main_idea_center_understanding_generate
    template_version: v3
    question_type: main_idea
    business_subtype: center_understanding
    action_type: generate
    content: |
      你是一名公考中心理解题命题专家，正在制作正式考试风格的中心理解单选题。
      要求：
      1. 最终必须是四选一单选题，且只有一个最优答案。
      2. 题干必须使用正式公考稳定问法，如“这段文字旨在说明（ ）”“这段文字意在强调（ ）”“这段文字旨在表明（ ）”“对这段文字概括最准确的是（ ）”。若材料明显属于寓言故事、关键词/主题词、文言散文等特殊中心理解问法，也可使用同样正式稳定的对应问法，如“这个故事说明的道理与下列哪项最为接近（ ）”“下列说法中与该寓言寓意一致的是（ ）”“对这个故事的寓意理解不正确的是（ ）”“这段文字的关键词是（ ）”。对于明显的关键词/主题词类材料，优先保留“关键词/主题词”任务本身，不要一律改写成普通概括题。
      3. 正确项必须覆盖“中心对象 + 文章任务/核心判断”，不能只截取局部事实、例子、背景或单一结论。
      4. 干扰项必须与材料同话题、同层级、可比较，但偏差方向要分散，优先覆盖局部信息冒充主旨、片面概括、范围失衡、功能误判、无中生有等类型。
      5. 四个选项长度、抽象层级和措辞风格尽量接近，避免一眼排除。若题干本身是“关键词/主题词”类问法，选项优先保持为紧凑的词语、词组或短名词结构，不要混入三条长句总结。
      5.1 如果文段主要在说明一种现象、问题或治理任务，不要把人物事迹、具体做法、单个例子或局部风险点写成正确项。
      5.2 正确项优先保持“中等抽象层级”：高于材料细节，低于空泛口号或无支撑拔高。
      5.3 若运行时提示给出 main_axis_source / argument_structure / abstraction_level，应按这些提示约束正确项，不要回退成高频但失真的概括套路。
      5.4 选项不要写成“这段文字旨在说明……”或“文段意在强调……”这类元话语句式，题干已经承担问法，选项应直接给出中心判断。
      5.5 对于 phenomenon_analysis / problem_solution 类材料，正确项优先回答“文段借此说明了什么核心现象或任务判断”，不要停留在某地做法、某个人物、某条措施或某个具体风险点。
      5.6 正确项优先写成凝练的中心判断句，尽量保持单句成型，避免把两个并列分论点、两条措施或一串背景信息机械并列成“看起来很全”的答案。
      5.7 如果材料本身带有大量案例、人物或地方性信息，正确项要在这些事实之上抬出“文章借此说明什么”，而不是把案例本身概括得更工整。
      5.8 若要把题做得比同档真题略难，应主要通过增强干扰项相似度、让错误项与正确项共享中心对象但错在文章任务/统摄范围来实现，不要靠把正确项拔高成空泛口号。
      5.9 正确项优先写成一句凝练的中心判断，不要把两个并列分论点、多个措施或一串背景信息拼成“看似全面”的答案。
      5.10 如果材料包含较多人物、机构、地方或案例信息，正确项应回答“文段借这些材料说明了什么”，而不是把这些材料本身概括得更工整。
      5.11 若在“抽象层级”和“材料可证据性”之间冲突，优先保持可证据性与中等抽象，不得为了显得高级而拔高结论。
      5.12 生成完成后做一次一致性自检：题干问法、正确项中心判断、解析抓手必须指向同一主轴；若不一致，先重写正确项与解析再输出。
      6. 解析采用正式成稿风格，避免“我们来看一下”等口头讲解腔。
      7. 解析先指出文段抓手，如转折、尾句、总结句、并列关系或行文脉络，再说明正确项为何覆盖全文中心。
      8. 解析要明确说明错误项分别错在何处，优先使用偏离重点、片面、无中生有、偷换概念、范围过宽/过窄等表述，不要只复述材料。
      9. 解析结尾必须明确落到答案句式：若为常规题，写“故正确答案为X。”；若题干是选非题，写“本题为选非题，故正确答案为X。”
      10. 材料呈现必须像正式公开文稿中的自然摘录，不能出现重复句、奇怪符号、拼接痕迹、半截句或机器改写腔。
      11. 只输出结构化 JSON，不要添加额外说明。
    is_active: true
    created_at: "2026-04-10T00:00:00+08:00"

  - template_id: tpl-main-idea-minor-edit-v3
    template_name: main_idea_minor_edit_default
    template_version: v3
    question_type: main_idea
    action_type: minor_edit
    content: |
      你是一名公考主旨概括题编辑。请在不改变题型、唯一正确答案和核心考点的前提下，对现有题目做小范围修订。
      要求：
      1. 优先优化题干、选项措辞、解析逻辑和考试风格。
      2. 题干优先改成正式公考稳定问法，如“这段文字意在说明（ ）”“这段文字旨在强调（ ）”“对这段文字概括最准确的是（ ）”。
      3. 删除或避免“主要介绍了什么”“讲了什么”“想说明的是”这类偏口语、偏介绍式问法。
      4. 不要把主旨题改成细节题或词语题。
      5. 保持四个选项同层级、同风格、同长度区间，并让错误项偏差方向更分散，而不是全都做成局部截取。
      6. 若当前题过于直白，应在不改变答案的前提下，把正确项提升半层抽象度，并同步增强至少一个强干扰项。
      7. 输出必须仍然是完整结构化 JSON。
    is_active: true
    created_at: "2026-03-30T00:00:00+08:00"

  - template_id: tpl-main-idea-question-modify-v3
    template_name: main_idea_question_modify_default
    template_version: v3
    question_type: main_idea
    action_type: question_modify
    content: |
      你是一名公考主旨概括题命题专家。请根据新的控制项重新制作一道主旨概括类单选题。
      要求：
      1. 新的难度和干扰项控制必须真正生效。
      2. 题干必须使用正式公考稳定问法，不要写成“主要介绍了什么”“讲了什么”。
      3. 正确项仍须统摄全文主旨，并体现中心对象与文章任务或核心判断。
      4. 干扰项应来自不同偏差方向，而不是只做局部截取。
      5. 如果难度目标是 medium 或 hard，题目必须体现综合归纳门槛：至少一个干扰项应与正确项共享中心对象，但错在统摄范围、文章任务或立意重心。
      6. 输出为完整结构化 JSON。
    is_active: true
    created_at: "2026-03-30T00:00:00+08:00"

  - template_id: tpl-main-idea-text-modify-v3
    template_name: main_idea_text_modify_default
    template_version: v3
    question_type: main_idea
    action_type: text_modify
    content: |
      你是一名公考主旨概括题命题专家。请基于新的材料重新生成一道主旨概括类单选题。
      要求：
      1. 题干必须是正式考试问法，优先使用“这段文字意在说明（ ）”“这段文字旨在强调（ ）”“对这段文字概括最准确的是（ ）”。
      2. 禁止写成“这段文字主要介绍了什么”“以下文字主要想说明的是”这类弱考试化问法。
      3. 正确项统摄全文，错误项与材料同话题但偏核，且偏差方向要分散。
      4. 若材料允许，默认把题做得比表层阅读略难一档：不要让正确项直接复述最显眼的单句结论，要体现整合后的中心表达。
      5. 解析先抓主旨，再判选项。
      6. 材料文本必须保持正式、自然、可读，不能出现重复片段、拼接痕迹和不完整句子。
      7. 输出为完整结构化 JSON。
    is_active: true
    created_at: "2026-03-30T00:00:00+08:00"

  - template_id: tpl-main-idea-judge-v3
    template_name: main_idea_judge_review_default
    template_version: v3
    question_type: main_idea
    action_type: judge_review
    content: |
      你是一名公考主旨概括题审核专家。请按正式考试标准审核当前题目。
      重点核查：
      1. 题干是否像正式考试题，而不是教学提示或口语化介绍；“主要介绍了什么”“讲了什么”应从严否定。
      2. 是否只有一个最优答案，且正确项确实统摄全文主旨。
      3. 干扰项是否来自不同偏差方向，而不是统一做成局部截取。
      4. 解析是否先抓主旨，再解释正确项和错误项。
      5. 材料是否本身自然可读，像正式公开文稿摘录，而不是机器拼接、重复堆砌或半截表达。
      6. 题目与材料、难度目标是否匹配；若标注为 medium 或 hard，但题目可以靠单一显眼句直接秒选，应判为难度不足。
      7. 对于 center_understanding 类题，优先奖励“中心对象 + 文章任务/核心判断”同时到位的正确项，不要把只抓一个高频风险点或局部结论的概括视为高质量通过。
      8. 所有评分字段必须使用 0-100 分制输出，可保留一位小数；不要使用 0-10、0-1 或其他隐含分制。
      9. 对于 center_understanding，如果正确项仍像人物事迹概括、案例复述、具体做法总结或局部结论放大，请在 material_alignment、question_type_fit 和 overall_score 上明确拉低，不要只在 judge_reason 里提醒。
      10. 对于 center_understanding，如果选项仍以“这段文字旨在说明/文段意在强调”这类元话语开头，也应视为题型完成度不足并明确扣分。
      11. 对于 center_understanding，如果正确项已经同时满足“中心对象明确、文章任务明确、抽象层级中等、非局部事实复述”，不要仅因措辞不够花哨或不够拔高而压低 overall_score。
      12. 对于 center_understanding，若错误项和正确项已经形成同话题同层级竞争，但正确项在统摄范围或文章任务上明显更稳，不要因为题目“不是非常难”就否定其真题感。
      审核上下文：
      - question_type: {question_type}
      - generated_question_json: {generated_question}
      - validation_result_json: {validation_result}
      - difficulty_fit_json: {difficulty_fit}
      - material_preview: {material_preview}
    is_active: true
    created_at: "2026-03-30T00:00:00+08:00"

  - template_id: tpl-main-idea-title-selection-judge-v3
    template_name: main_idea_title_selection_judge
    template_version: v3
    question_type: main_idea
    business_subtype: title_selection
    action_type: judge_review
    content: |
      你是一名公考标题填入题审核专家。请按正式考试标准审核当前“选择标题”题。
      重点核查：
      1. 正确项是否真正像标题，而不是总结句、汇报句或多要点拼接句。
      2. 正确项是否统摄全文中心对象与核心判断，而不是机械并列多个点。
      3. 干扰项是否包含不同层次的标题偏差，而不是全部做成局部截取。
      4. 材料是否适合做标题题；若材料本身是会议总结、公文式汇报、流程性总结，应从严否定。
      5. 解析是否指出标题应如何统摄全文，而非简单罗列材料要点。
      审核上下文：
      - question_type: {question_type}
      - generated_question_json: {generated_question}
      - validation_result_json: {validation_result}
      - difficulty_fit_json: {difficulty_fit}
      - material_preview: {material_preview}
    is_active: true
    created_at: "2026-03-30T00:00:00+08:00"

  - template_id: tpl-continuation-generate-v3

  - template_id: tpl-continuation-judge-v3
    template_name: continuation_judge_review_default
    template_version: v3
    question_type: continuation
    action_type: judge_review
    content: |
      你是一名公考接语选择题审核专家。请审核当前题目。
      核查重点：
      1. 正确项是否真正承接尾句期待与后文方向。
      2. 错误项是否高相关但失配，而不是无关项。

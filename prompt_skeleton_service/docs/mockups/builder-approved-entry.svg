<svg width="1440" height="820" viewBox="0 0 1440 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="820" fill="#EEF3F9"/>
  <rect x="88" y="48" width="1264" height="724" rx="30" fill="#FFFFFF" stroke="#D7E1EE"/>
  <rect x="132" y="96" width="820" height="62" rx="20" fill="#FFFFFF"/>
  <text x="136" y="132" fill="#20324D" font-size="34" font-family="Arial" font-weight="700">首页右上增加“已确认历史”入口</text>
  <text x="136" y="168" fill="#61738E" font-size="18" font-family="Arial">用户可以随时回看以前已经确认通过的题，不用重新生成。</text>
  <rect x="1108" y="102" width="164" height="50" rx="14" fill="#F3F8FE" stroke="#8BB0E9"/>
  <text x="1141" y="133" fill="#275B97" font-size="22" font-family="Arial" font-weight="700">已确认历史</text>
  <rect x="132" y="216" width="1176" height="86" rx="20" fill="#F7FAFF" stroke="#E3EBF5"/>
  <text x="160" y="250" fill="#415671" font-size="20" font-family="Arial">题型 / 业务子类 / 业务孙类 / 难度 / 数量</text>
  <text x="160" y="281" fill="#6B7D96" font-size="16" font-family="Arial">这里保持你现在的首页布局，只是在右上角放一个历史入口。</text>
  <rect x="132" y="336" width="1176" height="166" rx="24" fill="#FFF9F0" stroke="#F1DFBF"/>
  <text x="160" y="374" fill="#7E5C18" font-size="24" font-family="Arial" font-weight="700">参考母题 fewshot 入口</text>
  <text x="160" y="408" fill="#8D7550" font-size="17" font-family="Arial">这一块仍然保留。历史入口和首页构建区并列存在，不抢主流程。</text>
  <rect x="132" y="544" width="1176" height="168" rx="24" fill="#FAFCFF" stroke="#E3EBF5"/>
  <text x="160" y="582" fill="#20324D" font-size="22" font-family="Arial" font-weight="700">你点右上角后，会弹出“已确认历史”侧窗</text>
  <text x="160" y="618" fill="#61738E" font-size="17" font-family="Arial">左侧按时间倒序列题目，右侧直接看材料 / 题干 / 选项 / 解析，并可再次下载。</text>
</svg>

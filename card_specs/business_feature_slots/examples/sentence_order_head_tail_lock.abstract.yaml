schema_version: business_slot.v1

card_meta:
  business_card_id: sentence_order__head_tail_lock__abstract
  display_name: 语句排序-首尾句锁定
  description: 先判断首句与尾句合法性，再锁定整体顺序的业务卡。
  mother_family_id: sentence_order
  enabled: true
  card_role: supporting_constraint_card
  source: textbook_business_card
  tags:
    - 语句排序题
    - 首句
    - 尾句
    - 总结句

feature_signature:
  relation_type: 首尾锁定
  sentence_order_scoring_mode: head_tail_lock
  relation_focus: 确定首句与尾句
  typical_formats:
    - 将以上几个句子重新排列，语序正确的是……
    - 将以下几个句子重新排列，语序正确的是……

schema_alignment:
  schema_status: aligned_v2
  canonical_card_type: sentence_order
  structure_schema:
    sentence_count:
      mode: fixed
      value: 6
    sentence_roles:
      preferred:
        - thesis
        - definition
        - conclusion
        - countermeasure
    head_constraints:
      must_not_have:
        - backward_reference
        - mid_transition
      preferred_roles:
        - thesis
        - definition
    tail_constraints:
      must_have:
        - closure
      preferred_roles:
        - conclusion
        - countermeasure
    binding_pairs:
      - local_dependency
    ordering_logic:
      - thesis -> explanation -> conclusion
      - problem -> analysis -> solution
  uniqueness_source:
    - closure_position
    - reference_dependency

retrieval_profile:
  hard_filters:
    require_complete_unit: true
  soft_filters:
    preferred_document_genres:
      - 科普文
      - 说明文
    preferred_material_structures:
      - 观点-论证
      - 现象-分析
      - 问题-对策
    preferred_markers:
      - 因此
      - 所以
      - 看来
      - 应当
  ranking_weights:
    relation_match: 0.26
    marker_match: 0.15
    structural_match: 0.29
    semantic_completeness: 0.15
    readability: 0.10
    unique_opener_score: 0.05

slot_projection:
  question_type: sentence_order
  business_subtype: null
  pattern_candidates:
    - dual_anchor_lock
  type_slots:
    sentence_count: 6
    opening_anchor_type: explicit_topic
    opening_signal_strength: high
    middle_structure_type: local_binding
    local_binding_strength: medium
    closing_anchor_type: conclusion
    closing_signal_strength: high
    block_order_complexity: medium
    distractor_modes:
      - wrong_opening
      - wrong_closing
      - local_binding_break
    distractor_strength: high
    sentence_roles: [thesis, conclusion]
    head_constraints:
      must_not_have: [backward_reference, mid_transition]
      preferred_roles: [thesis, definition]
    tail_constraints:
      must_have: [closure]
      preferred_roles: [conclusion, countermeasure]
    binding_pairs: [local_dependency]
    ordering_logic: thesis -> explanation -> conclusion
    uniqueness_source: [closure_position, reference_dependency]
  prompt_extras:
    business_feature_card_id: sentence_order__head_tail_lock__abstract
    business_feature_card_label: 语句排序-首尾句锁定
    business_core_rule: 先定首尾句，再补中段顺序
    supporting_constraint_only: true

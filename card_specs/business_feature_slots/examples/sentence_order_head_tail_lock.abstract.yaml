schema_version: business_slot.v1

card_meta:
  business_card_id: sentence_order__head_tail_lock__abstract
  display_name: 语句排序-首尾句锁定
  description: 先判断首句与尾句合法性，再锁定整体顺序的业务卡。
  mother_family_id: sentence_order
  enabled: true
  source: textbook_business_card
  tags:
    - 语句排序题
    - 首句
    - 尾句
    - 总结句

feature_signature:
  relation_type: 首尾锁定
  relation_focus: 确定首句与尾句

schema_version: business_slot.v1

card_meta:
  business_card_id: sentence_fill__ending_summary__abstract
  display_name: 语句填空-结尾总结前文
  description: 横线在结尾，空句承担总结前文主线的业务卡。
  mother_family_id: sentence_fill
  enabled: true
  source: textbook_business_card
  tags:
    - 语句填空题
    - 结尾
    - 总结前文

feature_signature:
  relation_type: 位置功能匹配
  business_function: summarize_previous_text
  relation_focus: 结尾空句要对前文主线做收束总结

retrieval_profile:
  hard_filters:
    require_complete_unit: true
  soft_filters:
    preferred_document_genres: [科普文, 评论文, 政策文, 宣传文]
    preferred_material_structures: [综合说明, 观点-论证, 现象-分析]
    preferred_markers: [因此, 所以, 可见, 总之]
  ranking_weights:
    relation_match: 0.38
    marker_match: 0.16
    structural_match: 0.16
    semantic_completeness: 0.15
    readability: 0.15

slot_projection:
  question_type: sentence_fill
  business_subtype: null
  pattern_candidates: [ending_summary]
  type_slots:
    blank_position: ending
    function_type: ending_summary
    logic_relation: summary
    context_dependency: low
    bidirectional_validation: low
    reference_dependency: low
    abstraction_level: medium
    distractor_modes: [function_mismatch, overgeneralization, topic_shift]
    distractor_strength: medium
  prompt_extras:
    business_feature_card_id: sentence_fill__ending_summary__abstract
    business_feature_card_label: 语句填空-结尾总结前文
    business_core_rule: 空句要对前文主线做收束总结

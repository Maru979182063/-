- card_id: fill_material.opening_topic_intro
  display_name: Opening Topic Intro
  selection_core: Opening blank that establishes the passage entry point by introducing the topic, object, issue scope, or evaluative direction that the following passage keeps expanding, without already compressing the whole passage into one summary judgment; this especially includes quote-led, proverb-led, poem-led, question-led, or scene-setting openers.
  structures:
  - opening_intro
  - topic_entry
  - scope_anchor
  required_signals:
    blank_position: opening
    function_type: topic_intro
    logic_relation: continuation
  preferred_signals:
  - topic/object is explicitly positioned at the opening
  - opening may take the form of a proverb, quotation, poem line, question, or scene-setting line that frames the topic
  - opening is introduced by forms like 姝ｆ墍璋? 鍙よ瘲浜? 淇楄瘽璇? 璇曢棶, 閭ｄ箞, or a quoted maxim
  - following sentences expand on that object
  - following sentences keep the same issue scope or stance direction
  - downstream may immediately unfold as reason enumeration, example explanation, or stance justification for the opening frame
  - one immediate case-launching or example sentence after the opener is still acceptable when that example is only used to unfold the same topic entry
  - quote-led or slogan-led openings that immediately lock onto a historical subject, commemorative object, or collective value direction still count as topic-entry units
  - the opening primarily frames the topic or stance rather than fully summarizing all downstream claims
  - replacing it with a generic opener would damage topic stability or scope anchoring
  avoid_signals:
  - direct one-sentence condensation of the whole downstream argument
  - generic opening sentence with no object, scope, or stance anchor
  - no downstream expansion on the opening object or issue
  - broad opener remains acceptable after removing the current slot role
  - the example/background block itself has already become the real main unit, while the opener can be freely replaced
  candidate_contract:
    raw_policy: closed_span or whole_passage
    allowed_candidate_types:
    - closed_span
    - whole_passage
    preferred_candidate_types: []
  card_bias: opening topic-entry fill
  default_generation_archetype: topic_introduction
  distractor_bias:
  - generic opener
  - background sentence as topic lead
  - no downstream recovery
- card_id: fill_material.opening_clause_lead
  display_name: Opening Clause Lead
  selection_core: Opening blank inside the first sentence where the missing clause completes the sentence-internal lead, stance, or scope-setting frame rather than acting as a full independent opening sentence; the restored clause may carry the paragraph's global judgment, but it is still syntactically bound to the first sentence.
  structures:
  - opening_clause
  - intra_sentence_lead
  - local_topic_binding
  required_signals:
    blank_position: opening
    function_type: topic_intro
    logic_relation: continuation
    context_dependency: '>=0.56'
  preferred_signals:
  - blank lives inside the first sentence
  - the clause must co-complete the sentence with surrounding words
  - topic entry or evaluative direction depends on sentence-internal structure
  - later sentences continue the stance, object, or policy frame established by the first sentence
  - later sentences may enumerate reasons, evidence, or consequences for the restored first-sentence judgment
  - restored clause is followed by explicit reason listing such as 绗竴涓師鍥?绗簩涓師鍥? 棣栧厛/鍏舵, 涓€鏂归潰/鍙︿竴鏂归潰
  - removing the clause would collapse the first sentence's evaluative or policy stance, even if later discourse still expands that same stance
  - first sentence may take the form of a contrastive claim such as A says ... but research/practice shows ..., with the next sentence supplying direct evidence for that claim
  avoid_signals:
  - full-sentence summary opener
  - middle bridge disguised as opening
  - no clear clause boundary role
  - later sentences do not inherit the first-sentence frame
  - quote-led or proverb-led opening whose main role is topic framing rather than sentence-internal completion
  candidate_contract:
    raw_policy: closed_span preferred
    allowed_candidate_types:
    - closed_span
    preferred_candidate_types:
    - closed_span
  card_bias: opening clause-level fill
  default_generation_archetype: topic_introduction
  distractor_bias:
  - whole-sentence summary confusion
  - middle bridge confusion
  - unconstrained clause insertion
- card_id: fill_material.middle_enumeration_completion
  display_name: Middle Enumeration Completion
  selection_core: Middle blank inside an enumeration/list frame where the missing unit is a bounded list item rather than a generic bridge sentence.
  structures:
  - enumeration_frame
  - item_completion
  - bounded_local_slot
  required_signals:
    blank_position: middle
    function_type: carry_previous
    logic_relation: explanation
    context_dependency: '>=0.60'
  preferred_signals:
  - explicit list or numbered frame
  - blank is clearly one missing item in the frame
  - answer is constrained by both local slot role and surrounding list logic
  avoid_signals:
  - generic bridge-only sentence
  - no enumeration frame
  - many abstract fillers would fit equally well
  candidate_contract:
    raw_policy: closed_span preferred
    allowed_candidate_types:
    - closed_span
    preferred_candidate_types:
    - closed_span
  card_bias: enumerated-item completion fill
  default_generation_archetype: middle_explanation
  distractor_bias:
  - generic transition
  - wrong item role
  - context echo without true completion
- card_id: fill_material.ending_clause_summary
  display_name: Ending Clause Summary
  selection_core: Ending blank inside the closing sentence where the missing clause is the key closing component, not a brand-new argument.
  structures:
  - ending_clause
  - local_closure
  - closing_component
  required_signals:
    blank_position: ending
    function_type: conclusion
    logic_relation: summary
    context_dependency: '>=0.56'
  preferred_signals:
  - blank is part of the last sentence
  - sentence only closes after the clause is restored
  - clause recovers the passage task instead of opening new reasoning
  avoid_signals:
  - decorative phrase only
  - new argument introduced too late
  - no real closing need
  candidate_contract:
    raw_policy: closed_span or whole_passage
    allowed_candidate_types:
    - closed_span
    - whole_passage
    preferred_candidate_types: []
  card_bias: ending clause-level closure fill
  default_generation_archetype: ending_summary
  distractor_bias:
  - closing ornament
  - late new claim
  - no task recovery
- card_id: fill_material.ending_countermeasure
  display_name: Ending Countermeasure
  selection_core: Ending blank that lands the passage on a countermeasure/action direction after analysis or diagnosis.
  structures:
  - ending_countermeasure
  - problem_to_action
  - action_landing
  required_signals:
    blank_position: ending
    function_type: countermeasure
    logic_relation: continuation
  preferred_signals:
  - earlier text diagnoses a problem or tension
  - blank lands on an action or countermeasure direction
  - replacing it with plain summary would lose the action landing
  avoid_signals:
  - action call with no diagnosed issue
  - pure value statement without action landing
  - generic conclusion sentence
  candidate_contract:
    raw_policy: closed_span or whole_passage
    allowed_candidate_types:
    - closed_span
    - whole_passage

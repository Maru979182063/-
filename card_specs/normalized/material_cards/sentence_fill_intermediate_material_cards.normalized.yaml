schema_version: material_card_registry.v1
registry_id: sentence_fill_material_cards_v1
business_family_id: sentence_fill
registry_role: intermediate_structure_cards
notes:
- 以下8张卡以语句填空题配置文件中的8个pattern为核心原型，并对齐docx真题的空位功能方式。
- 这些卡是材料层中间结构卡，不直接等于题目生成prompt。
- question card会将8张材料卡一对一映射到8个填空生成原型。
cards:
- card_id: fill_material.opening_summary
  display_name: 段首总起卡
  selection_core: 空位位于段首，需要一句总起/统摄/定向句为后文建立稳定阅读方向。后文可以是多维分述，也可以围绕同一对象、任务或判断持续展开；不要求答案措辞已经接近唯一。
  structures:
  - 段首空位
  - 总领后文
  - 高位概括
  required_signals:
    blank_position: opening
    function_type: summary
    logic_relation: summary
    abstraction_level: '>=0.60'
  preferred_signals:
  - 后文信息密集且维度较多
  - 存在明显分述关系
  - 可被一句话高位统摄
  - 后文持续围绕同一对象、任务或判断展开
  - first sentence already establishes the paragraph-level judgment, while the next 1-2 sentences mainly stay within the same object and serve as support rather than opening a new block
  - the second sentence may concretize the same evaluation through ownership, usage restriction, scene condition, or one direct explanatory fact, without breaking the opening summary role
  - restored opening works best as a full declarative summary judgment rather than a quote-led or question-led frame
  avoid_signals:
  - 后文并不回收段首方向
  - 后文主题散乱不可压缩
  - 总起句会抢占后文结论功能
  - opening is mainly framed by a proverb, quotation, poem line, or rhetorical question
  - missing unit is still grammatically bound to the first sentence rather than functioning as a stand-alone summary sentence
  - first sentence mainly serves as a shell for a quoted maxim, proverb, or question lead
  - later discourse immediately unfolds as first/second reasons, Q-and-A, or explicit issue framing for the opening shell
  candidate_contract:
    raw_policy: whole_passage 或 multi_paragraph_unit 优先
    allowed_candidate_types: &id001
    - closed_span
    - whole_passage
    - multi_paragraph_unit
    preferred_candidate_types: *id001
  card_bias: 总起统摄型填空
  default_generation_archetype: opening_summary
  distractor_bias:
  - 维度错位
  - 只抓局部功能
  - 主题不匹配

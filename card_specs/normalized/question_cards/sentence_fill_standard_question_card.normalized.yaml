schema_version: question_card.v1
card_id: question.sentence_fill.standard_v1
card_type: question
business_family_id: sentence_fill
business_subtype_id: sentence_fill_selection
runtime_binding:
  question_type: sentence_fill
  business_subtype: null

distill_runtime_overlay:
  overlay_mode: leaf_primary_parent_supplement

description: "语句填空标准题卡；基于空位位置与上下文逻辑选择最合适的填入句，消费中间结构材料卡，不直接绑定单一母族。"
structure_schema:
  blank_position:
    type: enum
    values:
      - opening
      - middle
      - ending
      - inserted
      - mixed
  function_type:
    type: enum
    values:
      - summary
      - topic_intro
      - carry_previous
      - lead_next
      - bridge
      - reference_summary
      - countermeasure
      - conclusion
  reference_anchor:
    type: optional
  bidirectional_check:
    previous_valid: bool
    next_valid: bool
  semantic_scope:
    type: enum
    values:
      - local
      - sentence_level
      - paragraph_level
uniqueness_source:
  - function_mismatch
  - reference_failure
  - scope_mismatch
legacy_slot_mapping:
  function_type:
    opening_summary: summary
    summarize_following_text: summary
    middle_explanation: carry_previous
    middle_focus_shift: lead_next
    bridge_both_sides: bridge
    ending_summary: conclusion
    ending_elevation: conclusion
    summarize_previous_text: conclusion
    inserted_reference: reference_summary
    comprehensive_match: bridge
    topic_introduction: topic_intro
    propose_countermeasure: countermeasure
  logic_relation:
    continuation_or_transition: continuation
upstream_contract:
  required_candidate_types:
  - closed_span
  - insertion_context_unit
  - multi_paragraph_unit
  - whole_passage
  required_profiles:
  - abstraction_level
  - bidirectional_validation
  - blank_position
  - context_dependency
  - function_type
  - logic_relation
  - reference_dependency
  preferred_material_cards:
  - fill_material.opening_summary
  - fill_material.opening_topic_intro
  - fill_material.opening_clause_lead
  - fill_material.bridge_transition
  - fill_material.middle_focus_shift
  - fill_material.middle_explanation
  - fill_material.middle_enumeration_completion
  - fill_material.ending_summary
  - fill_material.ending_clause_summary
  - fill_material.ending_countermeasure
  - fill_material.ending_elevation
  - fill_material.inserted_reference_match
  - fill_material.comprehensive_multi_match
base_slots:
  blank_position: middle
  function_type: bridge
  logic_relation: continuation
  context_dependency: medium
  bidirectional_validation: medium
  reference_anchor: none
  reference_dependency: low
  abstraction_level: medium
  semantic_scope: sentence_level

  mother_family_id: sentence_order
  child_family_ids:
    - sentence_order_first_sentence
    - sentence_order_fixed_bundle
    - sentence_order_sequence
    - sentence_order_tail_sentence
display_name: 璇彞鎺掑簭鏍囧噯棰樺崱
description: "语句排序标准题卡；基于句群角色链与绑定关系确定唯一正确句序，消费中间结构材料卡，不直接绑定单一母族。"
formal_runtime_spec:
  primary_business_card_id: sentence_order__six_sentence_role_chain__abstract
  sortable_unit_count:
    mode: fixed
    value: null
  sortable_unit_sentence_span:
    min: 1
    max: 2
  sortable_unit_type: sentence_block
  candidate_type: sentence_block_group
  reject_non_six_unit_sequences: false
structure_schema:
  sortable_unit_count:
    mode: fixed
    value: null
  sortable_unit_sentence_span:
    min: 1
    max: 2
  sortable_unit_type: sentence_block
  sentence_roles:
    type: enum_list
    values:
      - thesis
      - definition
      - explanation
      - reasoning
      - transition
      - example
      - conclusion
      - countermeasure
  head_constraints:
    must_not_have:
      - backward_reference
      - mid_transition
    preferred_roles:
      - thesis
      - definition
  tail_constraints:
    must_have:
      - closure
    preferred_roles:
      - conclusion
      - countermeasure
  binding_pairs:
    type: list
  ordering_logic:
    type: pattern
    examples:
      - thesis -> explanation -> reasoning -> conclusion
      - problem -> analysis -> solution
      - definition -> explanation -> example -> conclusion
uniqueness_source:
  - role_order_conflict
  - reference_dependency
  - closure_position
  - binding_violation
legacy_slot_mapping:
  opening_anchor_type: head_constraints.preferred_roles
  closing_anchor_type: tail_constraints.preferred_roles
  local_binding_strength: binding_pairs
  middle_structure_type: ordering_logic
  block_order_complexity: ordering_logic
preferred_business_cards:
  primary:
  - sentence_order__six_sentence_role_chain__abstract
  supporting:
  - sentence_order__head_tail_logic__abstract
  - sentence_order__discourse_logic__abstract
  - sentence_order__deterministic_binding__abstract
  - sentence_order__head_tail_lock__abstract
  weak_legacy:
  - sentence_order__timeline_action_sequence__abstract
upstream_contract:

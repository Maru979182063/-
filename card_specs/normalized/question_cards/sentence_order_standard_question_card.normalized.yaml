  - binding_pair_count
  - closing_anchor_type
  - closing_signal_strength
  - context_closure_score
  - discourse_progression_strength
  - exchange_risk
  - function_overlap_score
  - local_binding_strength
  - middle_structure_type
  - multi_path_risk
  - opening_anchor_type
  - opening_signal_strength
  - sequence_integrity
  - unique_opener_score

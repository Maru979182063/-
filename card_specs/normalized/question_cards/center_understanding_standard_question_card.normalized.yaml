schema_version: question_card.v1
card_id: question.center_understanding.standard_v1
card_type: question
business_family_id: title_selection
business_subtype_id: center_understanding
runtime_binding:
  question_type: main_idea
  business_subtype: center_understanding
display_name: 中心理解标准题卡
description: 基于整篇/闭合材料，为文段选择最能覆盖论证主轴与表达任务的中心理解项。为了兼容现有材料族，暂沿用 title_selection 材料家族，但题卡语义按 center_understanding 独立建模。
structure_schema:
  argument_structure:
    type: enum
    values:
      - total_sub
      - sub_total
      - parallel
      - problem_solution
      - phenomenon_analysis
      - example_conclusion
  main_axis_source:
    type: enum
    values:
      - transition_after
      - final_summary
      - global_abstraction
      - solution_conclusion
      - example_elevation
  abstraction_level:
    type: enum
    values:
      - low
      - medium
      - high
  distractor_types:
    type: list
    values:
      - detail_as_main
      - example_as_conclusion
      - scope_too_wide
      - scope_too_narrow
      - subject_shift
      - focus_shift
uniqueness_source:
  - axis_coverage
  - abstraction_match
legacy_slot_mapping:
  structure_type: argument_structure
  main_point_source: main_axis_source
  distractor_modes: distractor_types
  business_family_id: title_selection
upstream_contract:
  required_candidate_types:
  - closed_span
  - multi_paragraph_unit
  - whole_passage
  required_profiles:
  - analysis_to_conclusion_strength
  - core_object
  - example_to_theme_strength
  - global_main_claim
  - multi_dimension_cohesion
  - object_scope_stability
  - problem_signal_strength
  - single_center_strength
  - summary_strength
  - turning_focus_strength
  - value_judgement_strength
  preferred_material_cards:
  - title_material.turning_focus
  - title_material.problem_essence_judgement
  - title_material.multi_dimension_unification
  - title_material.case_to_theme_elevation
  - title_material.example_then_recovery
  - title_material.plain_main_recovery
base_slots:
  structure_type: progressive
  main_point_source: whole_passage
  abstraction_level: medium
  coverage_requirement: integrated
  target_form: article_task
  title_style: neutral
  distractor_modes:
  - function_misread
  - topic_shift
  - overgeneralization
  distractor_strength: high
  statement_visibility: medium
  argument_structure: phenomenon_analysis
  main_axis_source: global_abstraction
  distractor_types:
  - detail_as_main
  - scope_too_narrow
  - focus_shift
  uniqueness_source:
  - axis_coverage
  - abstraction_match
slot_extensions:
  core_object_anchor_required: true
  require_global_axis_extraction: true
  strongest_distractor_gap: small_or_medium
  distractor_hierarchy_profile:
  - nearest_axis_miss
  - mid_local_valid
  - far_topic_shift
generation_archetype_source: material_card.default_generation_archetype
material_card_overrides:
- material_card: title_material.turning_focus
  slot_overrides:
    structure_type: turning
    argument_structure: sub_total
    main_axis_source: transition_after
    statement_visibility: medium
- material_card: title_material.problem_essence_judgement
  slot_overrides:
    structure_type: progressive
    argument_structure: problem_solution
    main_axis_source: solution_conclusion
    target_form: article_task
- material_card: title_material.multi_dimension_unification
  slot_overrides:
    structure_type: progressive
    argument_structure: parallel
    main_axis_source: global_abstraction
    abstraction_level: medium
- material_card: title_material.case_to_theme_elevation
  slot_overrides:
    structure_type: progressive
    argument_structure: example_conclusion
    main_axis_source: example_elevation
    abstraction_level: medium
- material_card: title_material.example_then_recovery
  slot_overrides:
    structure_type: progressive
    argument_structure: example_conclusion
    main_axis_source: example_elevation
    abstraction_level: medium
- material_card: title_material.plain_main_recovery
  slot_overrides:
    structure_type: explicit_single_center
    argument_structure: total_sub
    main_axis_source: final_summary
    abstraction_level: low
generation_archetypes:
  axis_extraction:
    source: center_understanding schema alignment
    processing_type: 论证主轴抽取
    correct_logic: 正确项必须覆盖全文主轴并保持恰当抽象层级，而不是复述局部信息或例子
    analysis_framework:
    - 判断文章整体论证结构
    - 定位主轴真正来源
    - 确认正确项覆盖全文而非局部
    - 排除细节、例子、范围失衡和对象偷换
validator_contract:
  center_understanding:
    require_axis_coverage: true
    disallow_detail_as_answer: true
    disallow_example_as_answer: true
    min_final_candidate_score: 0.3
    min_readiness_score: 0.4
    max_total_penalty: 0.45
    review_if_high_readiness_high_penalty: true
    min_reasoning_depth_score: 0.4
    max_ambiguity_score: 0.58
    difficulty_band_allowed:
    - medium
    - hard
  extension_rules:
  - 正确项必须说明全文围绕的中心对象以及文章在说明/解释/论证什么。
  - 至少1个错误项与正确项共享对象域，但在主轴、抽象层级或重心上失效。
  - 解析必须显式指出主轴来源、抽象层级和错项错因。
answer_grounding:
  require_material_traceability: true
  require_central_meaning_alignment: true
  disallow_detail_as_correct_answer: true
  disallow_stronger_conclusion: true
normalized_from: center_understanding_standard_question_card.yaml
normalization_notes:
- center_understanding runtime binding is now explicitly normalized instead of falling through title_selection only
- business_family_id temporarily reuses title_selection for material compatibility; schema semantics are center_understanding-specific
- required_profiles intentionally stay close to the existing title_selection material family to avoid tightening runtime contracts before main-chain consumption is updated
